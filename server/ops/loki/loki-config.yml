# Loki config for the reference stack — single-binary, filesystem storage.
#
# Retention: 30 days (720h) — telemetry-privacy.md §4 logs window (a ceiling;
# operators may shorten). The compactor enforces deletion.
#
# Log privacy discipline (telemetry-privacy.md §3): only server-side structured
# logs + client ERROR/CRITICAL ingest counts land here — no chat content, no
# PII. Session IDs are ephemeral and kept in the log body, not as labels.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h        # 30 days (telemetry-privacy.md §4)
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true       # enforce the 30d window
  retention_delete_delay: 2h

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  enable_api: true
