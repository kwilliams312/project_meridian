# Chibi pack (#757/#776) — Priest offense/debuff. The Tier-1 executor has no
# aura-removal primitive, so Purge truthfully deals direct holy damage and applies
# a strength debuff; it does not claim to dispel an aura. Re-authored into the
# chibi namespace (design §5/§7).
schema: meridian/ability@1
id: chibi:ability.priest_purge
name: Purge
description: Scours one enemy for {amount} holy damage and weakens its strength.
school: holy
target: enemy
range_m: 30
cast:
  time_ms: 0
cooldown_ms: 8000
resource:
  type: mana
  amount: 20
effects:
  - kind: damage
    amount: { min: 18, max: 24 }
  - kind: debuff
    attribute: chibi:attribute.strength
    amount: -10
    modifier: flat
    duration_ms: 10000
