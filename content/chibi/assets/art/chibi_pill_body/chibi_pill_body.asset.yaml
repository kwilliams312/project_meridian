# IF-8 sidecar (meridian/asset@1). Chibi pill-body base — the keystone SP5 chibi
# character base (epic #722), migrated into the `chibi` namespace (story #755,
# spec §7). This is the re-authored copy of the #746 body: the SAME restyled glb
# + prompts sibling, with only the id prefix rewritten core: -> chibi: and a
# fresh id allocated in chibi's IF-9 band. The legacy `core:art.chibi_pill_body`
# copy is left in place as retired legacy (follow-up #765) — no active realm
# loads `core`, so this migration is purely ADDITIVE to the chibi pack.
#
# Provenance is carried over unchanged from #746: a real stylized low-poly mesh
# generated with Meshy (image-to-3D from an operator-supplied chibi reference,
# model meshy-5; the prompts sibling pins the submitted image's SHA-256) and
# restyled to the canonical Meridian rig per the tools/blender/README.md restyle
# procedure (spec ⑤/S4) under the `chibi` proportion profile (story #745):
# fitted to rig scale + T-pose stance, budget-cleaned to the Art PRD §2.1
# player-body band with an authored LOD0-3 chain, cut into the 8
# geo_<region>_lod<N> geosets, and skinned to the canonical 63-bone armature
# (<=4 influences, normalized). source_tier: ai — the restyle pass is complete,
# so restyle_status: done (the #525 quarantine lint blocks 'pending').
