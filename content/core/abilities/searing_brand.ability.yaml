# Seed skeleton pack (SP1.8 integration proof) — a ranged burn that also weakens
# the target. Modelled on the `aura` primitive: periodic fire damage (the burn)
# plus a stat_mods entry that weakens the target's strength (the "softening").
#
# NOTE (SP2 — #691/#692): the world DB now transports the FULL effect palette. The
# `ability` row carries the ordered effects[] recipe as a generic `effects_json`
# JSON payload (schema/sql/world/30_ability.sql; the per-kind `ability_effect` DDL
# is retired), so `mcc emit-sql` emits ANY kind without a per-kind DDL change and
# worldd deserializes the full palette at load (server/worldd/db_content_store.cpp,
# SP2.2). Re-authoring this into a `dot` (the burn) + `debuff` (the softening)
# would emit + load cleanly; it is left on `aura` here — an optional follow-up — to
# avoid a golden/staged-pack rewrite. (armor is a derived attribute, not a v1
# primary statKey, so the weakening rides on strength here.)
schema: meridian/ability@1
id: core:ability.searing_brand
name: Searing Brand
description: Marks the target with fire, dealing {amount} damage over time and weakening it.
school: fire
target: enemy
range_m: 30
cast:
  time_ms: 0
cooldown_ms: 12000
resource:
  type: mana
  amount: 20
effects:
  - kind: aura
    duration_ms: 9000
    periodic:
      kind: damage
      amount: { min: 4, max: 6 }
      tick_ms: 3000
    stat_mods:
      - stat: strength
        amount: -5
