# Seed skeleton pack (SP1.8 integration proof) — a ranged burn that also softens
# the target's armor. Exercises the `dot` primitive AND a `debuff` whose
# `attribute` field is L011-resolved against the meridian/attribute@1 catalog.
schema: meridian/ability@1
id: core:ability.searing_brand
name: Searing Brand
description: Marks the target with fire, dealing {amount} damage over time and weakening its armor.
school: fire
target: enemy
range_m: 30
cast:
  time_ms: 0
cooldown_ms: 12000
resource:
  type: mana
  amount: 20
effects:
  - kind: dot
    amount: { min: 4, max: 6 }
    duration_ms: 9000
    tick_ms: 3000
    coefficient: 0.15
  - kind: debuff
    attribute: core:attribute.armor
    amount: -5
    modifier: percent
    duration_ms: 9000
