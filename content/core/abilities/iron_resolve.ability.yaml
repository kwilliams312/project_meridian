# Seed skeleton pack (SP1.8 integration proof) — a self buff that raises stamina.
# Reworked (#688 CI fix) onto the currently-emittable `aura` primitive with a
# stat_mods entry. The world-DB DDL (schema/sql/world/30_ability.sql) only carries
# the SP1 effect palette — damage / heal / aura / threat — so the richer
# buff/debuff/dot/… kinds the ability *schema* gained in #653 have no world.sql
# emission yet. Extending the `ability_effect` DDL + mcc emit-sql per new kind is
# real kernel-consumption work and is DEFERRED to sub-project 2 (kernel
# ability-engine). New-effect-kind coverage still lives in the tests/ validation
# fixtures, which never emit to the DB.
schema: meridian/ability@1
id: core:ability.iron_resolve
name: Iron Resolve
description: Steels the body, increasing stamina for a time.
school: physical
target: self
range_m: 0
cast:
  time_ms: 0
cooldown_ms: 45000
triggers_gcd: false
resource:
  type: rage
  amount: 10
effects:
  - kind: aura
    duration_ms: 12000
    stat_mods:
      - stat: stamina
        amount: 8
