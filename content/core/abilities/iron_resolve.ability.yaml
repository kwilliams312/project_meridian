# Seed skeleton pack (SP1.8 integration proof) — a self buff that raises stamina.
# Modelled on the `aura` primitive with a stat_mods entry.
#
# NOTE (SP2 — #691/#692): the world DB now transports the FULL effect palette. The
# `ability` row carries the ordered effects[] recipe as a generic `effects_json`
# JSON payload (schema/sql/world/30_ability.sql; the per-kind `ability_effect` DDL
# is retired), so `mcc emit-sql` emits ANY kind without a per-kind DDL change and
# worldd deserializes the full palette at load (server/worldd/db_content_store.cpp,
# SP2.2). Re-authoring this ability onto the richer `buff` kind
# (attribute: core:attribute.stamina) would emit + load cleanly; it is left on
# `aura` here — an optional follow-up — to avoid a golden/staged-pack rewrite.
schema: meridian/ability@1
id: core:ability.iron_resolve
name: Iron Resolve
description: Steels the body, increasing stamina for a time.
school: physical
target: self
range_m: 0
cast:
  time_ms: 0
cooldown_ms: 45000
triggers_gcd: false
resource:
  type: rage
  amount: 10
effects:
  - kind: aura
    duration_ms: 12000
    stat_mods:
      - stat: stamina
        amount: 8
