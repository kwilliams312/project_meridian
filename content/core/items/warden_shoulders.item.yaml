schema: meridian/item@2
id: core:item.warden_shoulders
name: Warden's Pauldrons
flavor_text: Twin plates that shrug off a kobold's overhand as if it were rain.
item_class: armor
subclass: plate
slot: shoulders
rarity: rare
required_level: 10
item_level: 12
binding: on_equip
armor: 45
stats:
  - stat: stamina
    amount: 3
price:
  sell: 540
visual:
  icon: core:art.icon.item.warden_crest
  worn:
    models: [{ model: core:art.item.armor.warden_shoulders, mirror: none }]
    # No hides (issue #589): the pauldrons are deltoid caps that conform to and
    # sit ON the upper-outer torso — they do NOT cover the whole torso, so hiding
    # `torso` here would erase body the pauldrons don't replace and open the
    # blocky-plate void. In the full kit the chest cuirass hides+covers `torso`
    # and the pauldrons layer on top; shoulders-alone leaves the body intact.
    hides: []
    dye_channels: [primary, secondary]
