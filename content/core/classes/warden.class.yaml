# Seed skeleton pack (SP1.8 integration proof) — the Warden, a ranged/support
# HYBRID class. Exercises the `hybrid` branch of the role-XOR-hybrid rule (spec
# §2.4) and the "omitted = all races / no talent tree" defaults:
#   - abilities            → seed abilities (mending_word/searing_brand)
#   - usable_armor_types   → existing core equip_types (leather/mail, category=armor)
#   - usable_weapon_types  → existing core equip_types (staff/one_hand, weapon)
#   - hybrid               → two roles (dps_ranged + healer) — NOT role
#   - attribute_mods       → core attribute id (agility)
#   - race_limits          → omitted (all races may play this class)
#   - talent_tree          → omitted (no tree in the seed)
schema: meridian/class@1
id: core:class.warden
roster_id: 3   # canonical roster id (character.class); mirrors roster.h kWarden
name: Warden
description: A ranged hybrid who mends allies and burns foes at distance.
abilities:
  - core:ability.mending_word
  - core:ability.searing_brand
usable_armor_types:
  - core:equip_type.leather
  - core:equip_type.mail
usable_weapon_types:
  - core:equip_type.staff
  - core:equip_type.one_hand
hybrid:
  - dps_ranged
  - healer
attribute_mods:
  - attribute: core:attribute.agility
    value: 2
