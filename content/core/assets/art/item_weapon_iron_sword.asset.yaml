# IF-8 sidecar (meridian/asset@1). Iron Sword — a real Meshy text-to-3D sword
# sculpt (model meshy-5) restyled to the canonical socketed-weapon pose via
# tools/blender/meridian_rig/restyle_weapon.py (#605): oriented so the blade runs
# up the socket axis (Blender +Z → glTF +Y under export_yup, "up" out of the fist),
# the crossguard along X and the blade flat along Y — the exact pose the proven
# rusty_pickaxe ships in — with the grip/guard seated at the bottom (pommel at
# ~−0.06, matching the pickaxe) so the fist closes around the grip, uniform-scaled
# to a plausible ~0.9 m one-handed length, decimated into the Art PRD §2.1 weapon
# band, and its Meshy photo-texture stripped for a flat steel base so the shipped
# .glb stays a small STATIC single mesh (no skin, no armature, no animations) —
# identical in structure to the pickaxe, so the assembler's _mount_socketed attaches
# it on socket_main_hand exactly the same way. A weapon is socket-attached, NOT
# skinned/fit-to-body, so there is no body-fit, no dye UV, no skinning (simpler than
# the Warden armor restyle). source_tier: ai — the restyle pass is complete, so
# restyle_status: done (the #525 quarantine lint blocks 'pending'). PROVES the
# Meshy-weapon pipeline (first real WEAPON on the hand socket).
schema: meridian/asset@1
