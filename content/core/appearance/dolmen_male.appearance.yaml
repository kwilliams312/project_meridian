# meridian/appearance_catalog@1 — the dolmen/male character-create catalog
# (contract ①/T3 §5.1, client-assembler spec ② §3). Race #2 (Dolmen) D3: the
# per-race catalog that lets char-create select + preview a Dolmen. skeleton +
# body_model are the Dolmen-specific D1/D2 assets — the stockier "stone folk"
# skeleton (art.char.dolmen.male.skeleton) and its Meshy-sourced, restyled body
# (art.char.dolmen.male.base). Both share the 63 canonical bone NAMES with
# ardent_male (the shared-skeleton invariant), so ContentDB.catalog(2, 0) →
# THIS entry → the Dolmen body (not the Ardent one), and the assembler mounts a
# real Dolmen skeleton for race id 2.
#
# PRESETS reuse the ⑤ Ardent hair meshes, face textures and skin palettes
# verbatim (this is a NO-KEY story — no new Meshy assets are authored for D3, per
# the D3 plan). The hair meshes are skinned to the shared 63-bone rig by bone
# name, so they mount on the Dolmen skeleton exactly as they do on Ardent's; the
# face/skin ids are stable ints the server validates and the per-character
# appearance record stores (§5.2). Preset ids are the SAME stable integers as the
# Ardent catalog (hair/face 1..4, skin 1..3) and are append-only forever within
# THIS catalog — a re-tint pass can later swap the referenced asset id behind an
# id without renumbering. morphs ship at 0 for M1 (§2.5 crowd budget).
schema: meridian/appearance_catalog@1
id: core:appearance.dolmen.male
race: dolmen
sex: male
skeleton: core:art.char.dolmen.male.skeleton
body_model: core:art.char.dolmen.male.base
presets:
  hair:
    - { id: 1, model: core:art.char.ardent.male.hair_1 }
    - { id: 2, model: core:art.char.ardent.male.hair_2 }
    - { id: 3, model: core:art.char.ardent.male.hair_3 }
    - { id: 4, model: core:art.char.ardent.male.hair_4 }
  face:
    - { id: 1, texture: core:art.char.ardent.male.face_1 }
    - { id: 2, texture: core:art.char.ardent.male.face_2 }
    - { id: 3, texture: core:art.char.ardent.male.face_3 }
    - { id: 4, texture: core:art.char.ardent.male.face_4 }
  skin:
    - { id: 1, palette: core:art.char.ardent.male.skin_1 }
    - { id: 2, palette: core:art.char.ardent.male.skin_2 }
    - { id: 3, palette: core:art.char.ardent.male.skin_3 }
