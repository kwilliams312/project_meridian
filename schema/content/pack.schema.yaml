# meridian/pack@1 — pack manifest (content/<namespace>/pack.yaml)
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "meridian://schema/content/pack.schema.yaml"
type: object
additionalProperties: false
required: [schema, namespace, name, version, content_schema_version, engine, license]
properties:
  schema: { const: "meridian/pack@1" }
  namespace:
    description: Owns every ID in this pack. "core" is reserved for first-party content.
    type: string
    pattern: "^[a-z][a-z0-9_]{1,31}$"
    x-meridian-ui:
      group: identity
      label: Namespace
      widget: slug
      help: Stable prefix that owns every content ID in this pack.
      example: emberfall
      constraint: 2-32 lowercase letters, digits, or underscores; must start with a letter.
      documentation: schema/content/README.md
  name:
    $ref: "#/$defs/displayName"
    x-meridian-ui:
      group: identity
      label: Pack name
      widget: single_line
      help: Human-facing name shown when operators choose this content pack.
      example: Emberfall Adventures
  description:
    type: string
    maxLength: 2000
    x-meridian-ui:
      group: identity
      label: Description
      widget: multiline
      help: Optional summary of this pack's theme and intended use.
      constraint: At most 2,000 characters.
  version:
    description: Semver of this content pack.
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    x-meridian-ui:
      group: compatibility
      label: Pack version
      widget: semver
      example: 1.0.0
      constraint: Semantic version in major.minor.patch form.
      documentation: docs/superpowers/specs/2026-07-13-pack-contract-content-schema-design.md
  content_schema_version:
    description: Major schema version this pack is authored against.
    const: 1
    x-meridian-ui: { group: compatibility, label: Content schema version, widget: number }
  compatibility_version:
    description: >-
      Pack CONTRACT version — distinct from the semver `version`. Bumps ONLY on a
      breaking (non-additive) id change (a removed/renumbered id or removed
      capability, per the §3 breaking-change rules `mcc diff` classifies). Additive
      changes (new ids, new optional fields) never bump it. A realm records the
      value it booted with; a higher pack with a breaking diff refuses to boot until
      an operator migration runs (boot-gate contract, enforced in sub-project 2).
      Optional at rest — an absent value is treated as the baseline 1.
    type: integer
    minimum: 1
    x-meridian-ui:
      group: compatibility
      label: Compatibility version
      widget: number
      help: Increase only when the pack makes a breaking content-contract change.
  theme:
    description: >-
      Thin theme metadata (sub-project 1 slice). The full UI-theme/audio manifest
      folding + realm selection lands in sub-project 4; here it is display-only.
    type: object
    additionalProperties: false
    x-meridian-ui: { group: presentation, label: Theme presentation }
    properties:
      display_name:
        description: Human-facing theme name shown in a realm/pack picker.
        $ref: "#/$defs/displayName"
        x-meridian-ui: { group: presentation, label: Theme name, widget: single_line }
      tagline:
        description: One-line theme tagline.
        type: string
        maxLength: 200
        x-meridian-ui: { group: presentation, label: Tagline, widget: single_line }
      preview_asset:
        description: Optional art-registry id for a preview image.
        $ref: "#/$defs/artRef"
        x-meridian-ui:
          group: presentation
          label: Preview image
          widget: asset_picker
          reference_type: asset:art
        x-meridian-asset:
          allowed_classes: [icon, ui_art]
          eligible_generators: []
  engine:
    description: Engine pin — .pck packs are validated against this Godot version (Tools PRD R8).
    type: object
    additionalProperties: false
    required: [godot]
    x-meridian-ui: { group: compatibility, label: Engine compatibility }
    properties:
      godot:
        type: string
        pattern: "^4\\.\\d+$"
        x-meridian-ui:
          group: compatibility
          label: Godot version
          widget: single_line
          help: Engine major and minor version required to load this pack.
          example: "4.6"
          constraint: Use major.minor form, beginning with 4.
  dependencies:
    description: Other packs whose IDs this pack may reference.
    type: array
    x-meridian-ui: { group: dependencies, label: Pack dependencies }
    items:
      type: object
      additionalProperties: false
      required: [namespace, version]
      properties:
        namespace: { type: string, pattern: "^[a-z][a-z0-9_]{1,31}$" }
        version: { type: string, pattern: "^\\d+\\.\\d+\\.\\d+$" }
  authors:
    type: array
    x-meridian-ui: { group: attribution, label: Authors }
    items: { type: string }
  license:
    description: Pack-level default; per-asset provenance sidecars still required for art/audio (TD-09).
    type: string
    minLength: 1
    x-meridian-ui:
      group: attribution
      label: Default license
      widget: single_line
      example: Apache-2.0
