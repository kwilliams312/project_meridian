# meridian/skeleton@1 — character vocabulary (spec: 2026-07-09 data-contract design §3).
# Additive evolution ONLY: append entries; never rename/remove. A geoset region may
# gain `children:` when split; hide-masks naming the parent hide all children.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "meridian://schema/content/skeleton.defs.yaml"
$defs:
  geosetRegion:
    description: Coarse ×8 hideable body regions (owner decision 2026-07-09).
    enum: [head, hands, forearms, torso, waist, hips_legs, lower_legs, feet]
  attachSocket:
    description: Bone-attachment mount points (weapons/shields/sheaths).
    enum: [main_hand, off_hand, ranged, back, hip_l, hip_r, shield]
  dyeChannel:
    description: Max 3 == RGB dye-mask texture channels (spec §6).
    enum: [primary, secondary, accent]
  raceName:
    description: >-
      The canonical machine race-name vocabulary — the lowercased key the client
      builds its appearance catalog lookup from (ContentDB `<race>|<sex>`) and the
      appearance_catalog `race` field / item `race_overrides` keys reference.
      APPEND-ONLY: a shipped name never changes meaning or is removed.
      Two sources feed it, so it is a UNION, not a single-roster mirror:
        * the M0/core roster.h Race enum names (ardent, dolmen, sylvane, emberkin),
          in roster id order — roster.h stays the canonical source for those; and
        * pack-authored race machine-names that live purely in pack data with their
          own per-pack roster (the Chibi theme's 6 colour races, roster_ids 1–6 in
          the chibi roster — design 2026-07-14-chibi §4/§7). These are NOT in
          roster.h (the chibi realm loads its roster from pack data, #695/#708);
          they are appended here so their appearance catalogs validate.
      Do not invent a name with no backing race record (core enum OR a pack race).
    enum: [ardent, dolmen, sylvane, emberkin, red, green, blue, yellow, gold, silver]
  boneName:
    description: >-
      Canonical humanoid bone names (≤120 incl. face, art-prd §2.1). POPULATED BY
      the rig work (spec ④); source of truth is tools/blender/meridian_rig/bones.py
      (56 Godot SkeletonProfileHumanoid bones + 7 Meridian socket bones = 63) —
      drift-guarded by tests/test_meridian_rig.py. Previously an empty enum was
      valid for @1-draft ("no bone-name check yet"); populating it activates the
      import-validator I020+ bone-set checks (spec ④ §5).
    enum: [Root, Hips, Spine, Chest, UpperChest, Neck, Head, LeftEye, RightEye,
      Jaw, LeftShoulder, LeftUpperArm, LeftLowerArm, LeftHand, LeftThumbMetacarpal,
      LeftThumbProximal, LeftThumbDistal, LeftIndexProximal, LeftIndexIntermediate,
      LeftIndexDistal, LeftMiddleProximal, LeftMiddleIntermediate, LeftMiddleDistal,
      LeftRingProximal, LeftRingIntermediate, LeftRingDistal, LeftLittleProximal,
      LeftLittleIntermediate, LeftLittleDistal, RightShoulder, RightUpperArm,
      RightLowerArm, RightHand, RightThumbMetacarpal, RightThumbProximal,
      RightThumbDistal, RightIndexProximal, RightIndexIntermediate, RightIndexDistal,
      RightMiddleProximal, RightMiddleIntermediate, RightMiddleDistal, RightRingProximal,
      RightRingIntermediate, RightRingDistal, RightLittleProximal, RightLittleIntermediate,
      RightLittleDistal, LeftUpperLeg, LeftLowerLeg, LeftFoot, LeftToes, RightUpperLeg,
      RightLowerLeg, RightFoot, RightToes, socket_main_hand, socket_off_hand,
      socket_shield, socket_back, socket_ranged, socket_hip_l, socket_hip_r]
