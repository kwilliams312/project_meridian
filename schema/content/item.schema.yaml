# meridian/item@2 — items (ITM-01). @2 adds visual.worn, the modular-gear render
# contract (character/equipment/appearance design 2026-07-09, contract ①): how an
# equipped item attaches to / skins onto a character. Server never reads visuals
# (spec §8) — worn ships in the client pck only. Stat-budget lint vs item_level
# lands with ITM-03 (M2).
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "meridian://schema/content/item.schema.yaml"
type: object
additionalProperties: false
required: [schema, id, name, item_class, rarity, visual]
properties:
  schema: { const: "meridian/item@2" }
  id:
    $ref: "#/$defs/contentId"
    x-meridian-ui:
      group: identity
      label: Item ID
      widget: single_line
      help: Permanent fully qualified ID owned by this pack.
      example: emberfall:item.ashblade
      constraint: Use namespace:item.name with lowercase dot-separated segments.
      documentation: schema/content/README.md
  name:
    $ref: "#/$defs/displayName"
    x-meridian-ui:
      group: identity
      label: Display name
      widget: single_line
      help: Item name shown in inventory, loot, and vendor interfaces.
      example: Ashblade
  flavor_text: { type: string, maxLength: 500 }
  item_class: { $ref: "#/$defs/itemClass" }
  subclass:
    description: "weapon: sword_1h|sword_2h|axe_1h|axe_2h|mace_1h|mace_2h|dagger|staff|polearm|bow|wand|fist. armor: cloth|leather|mail|plate|shield. Free-form for other classes."
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
  # ADDITIVE (spec §2.1): references a meridian/equip_type@1 entity — the
  # armor/weapon-type catalog that class proficiencies gate against (sub-project 2).
  # Optional for back-compat: existing items without it stay valid; `subclass`
  # (a free-form descriptor) is retained and unaffected. The reference is a
  # local $defs (equipTypeRef): equip_type is a new content type not yet in
  # common.defs.yaml's ref grammar (owned by a sibling story), and a uniquely-named
  # local def survives the validators' `$defs.update(common)` merge. Resolution to
  # a defined equip_type id is enforced at the content level (validate_content L011
  # / mcc), not by file import.
  equip_type: { $ref: "#/$defs/equipTypeRef" }
  slot:
    enum: [head, shoulders, back, chest, wrist, hands, waist, legs, feet,
           neck, finger, trinket, main_hand, off_hand, two_hand, ranged, bag]
  rarity:
    enum: [poor, common, uncommon, rare, epic, legendary]
  required_level:
    type: integer
    minimum: 1
    default: 1
    x-meridian-ui:
      group: requirements
      label: Required level
      widget: number
      help: Minimum character level allowed to equip or use this item.
      constraint: At least 1.
  item_level:
    description: Drives stat-budget validation from M2 (ITM-03).
    type: integer
    minimum: 1
    default: 1
  unique: { type: boolean, default: false }
  binding:
    enum: [none, on_pickup, on_equip]
    default: none
  stack_size: { type: integer, minimum: 1, maximum: 1000, default: 1 }

  stats:
    type: array
    maxItems: 8
    items:
      type: object
      additionalProperties: false
      required: [stat, amount]
      properties:
        stat: { $ref: "#/$defs/statKey" }
        amount: { type: integer }

  weapon:
    type: object
    additionalProperties: false
    required: [damage, speed_ms]
    properties:
      damage: { $ref: "#/$defs/intRange" }
      speed_ms:
        type: integer
        minimum: 1000
        maximum: 5000
        x-meridian-ui:
          group: combat
          label: Weapon speed
          widget: number
          unit: ms
          help: Delay between weapon attacks.
          example: 2400
          constraint: 1,000-5,000 milliseconds.
      school: { $ref: "#/$defs/school", default: physical }

  armor: { type: integer, minimum: 0 }

  effects:
    type: object
    additionalProperties: false
    properties:
      on_use:
        description: Ability cast when the item is used; consumables are consumed on use.
        $ref: "#/$defs/abilityRef"
      on_equip:
        type: array
        items: { $ref: "#/$defs/abilityRef" }

  price:
    type: object
    additionalProperties: false
    properties:
      sell:
        description: Vendor sell-back value in copper. Omit for unsellable.
        $ref: "#/$defs/money"
      buy:
        description: Default vendor purchase price; vendors may override.
        $ref: "#/$defs/money"

  visual:
    type: object
    additionalProperties: false
    required: [icon]
    x-meridian-ui: { group: presentation, label: Visuals }
    properties:
      icon:
        $ref: "#/$defs/artRef"
        x-meridian-ui:
          group: presentation
          label: Inventory icon
          widget: asset_picker
          reference_type: asset:art
          help: Art-registry icon shown in inventory and loot interfaces.
          example: core:art.icon.item.rusty_pickaxe
          constraint: Select an icon asset ID; 3D generation is not available for icons.
        x-meridian-asset:
          allowed_classes: [icon]
          eligible_generators: []
      # Legacy monolithic model ref (pre-worn). Retained for non-modular items
      # (e.g. dropped-in-world mesh); `worn` is the modular-gear render contract.
      model:
        $ref: "#/$defs/artRef"
        x-meridian-ui:
          group: presentation
          label: World model
          widget: asset_picker
          reference_type: asset:art
          help: Optional 3D model used when the item appears in the world.
          example: core:art.weapon.rusty_pickaxe
          constraint: Select a weapon_model, armor_model, or prop asset ID; Meshy generation is available.
        x-meridian-asset:
          allowed_classes: [weapon_model, armor_model, prop]
          eligible_generators: [meshy]
      # worn — how this item renders on an equipped character (contract ① §4/§9).
      # Presence is gated by lints L080 (weapon/visible-armor require it; invisible
      # slots + non-equippables forbid it) and L081 (weapon→attach, armor→skinned;
      # attach XOR hides — EXCEPT subclass:shield, the sole armor exception: a
      # shield is bone-attached like a weapon, not skinned to the body, so it
      # REQUIRES attach and FORBIDS hides too; issue #460). Skeleton vocabulary
      # ($defs geosetRegion/attachSocket/dyeChannel/raceName) is the
      # meridian/skeleton@1 contract (T1).
      worn:
        type: object
        additionalProperties: false
        required: [models]
        properties:
          models:
            type: array
            minItems: 1
            items:
              type: object
              additionalProperties: false
              required: [model]
              properties:
                model:
                  $ref: "#/$defs/artRef"
                  x-meridian-ui:
                    group: presentation
                    label: Worn model
                    widget: asset_picker
                    reference_type: asset:art
                  x-meridian-asset:
                    allowed_classes: [weapon_model, armor_model]
                    eligible_generators: [meshy]
                mirror: { enum: [none, x], default: none }
          hides:
            type: array
            uniqueItems: true
            x-meridian-ui:
              group: presentation
              label: Hidden body regions
              help: Geoset regions hidden while this armor is worn to prevent body clipping.
              documentation: docs/superpowers/specs/2026-07-09-character-equipment-data-contract-design.md
            items: { $ref: "#/$defs/geosetRegion" }
          attach:
            type: object
            additionalProperties: false
            required: [socket]
            properties:
              socket:
                $ref: "#/$defs/attachSocket"
                x-meridian-ui:
                  group: presentation
                  label: Equipped socket
                  help: Skeleton attachment point used while this item is equipped.
                  example: main_hand
                  documentation: docs/superpowers/specs/2026-07-09-character-equipment-data-contract-design.md
              sheath_socket:
                $ref: "#/$defs/attachSocket"
                x-meridian-ui:
                  group: presentation
                  label: Sheathed socket
                  help: Optional skeleton attachment point used while the item is sheathed.
                  example: hip_l
                  documentation: docs/superpowers/specs/2026-07-09-character-equipment-data-contract-design.md
          dye_channels:
            type: array
            uniqueItems: true
            maxItems: 3
            items: { $ref: "#/$defs/dyeChannel" }
          race_overrides:
            type: object
            additionalProperties: false
            propertyNames: { $ref: "#/$defs/raceName" }
            patternProperties:
              "^[a-z][a-z0-9_]*$":
                type: object
                additionalProperties: false
                required: [models]
                properties:
                  models:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      additionalProperties: false
                      required: [model]
                      properties:
                        model:
                          $ref: "#/$defs/artRef"
                          x-meridian-ui:
                            group: presentation
                            label: Race-specific worn model
                            widget: asset_picker
                            reference_type: asset:art
                          x-meridian-asset:
                            allowed_classes: [weapon_model, armor_model]
                            eligible_generators: [meshy]
                        mirror: { enum: [none, x], default: none }
                  hides:
                    type: array
                    uniqueItems: true
                    items: { $ref: "#/$defs/geosetRegion" }

allOf:
  - if:
      properties: { item_class: { const: weapon } }
    then:
      required: [weapon, slot]
  - if:
      properties: { item_class: { const: armor } }
    then:
      required: [slot]

$defs:
  # A reference to a meridian/equip_type@1 id. Optional "<namespace>:" prefix
  # (resolves to the file's own namespace when omitted), mirroring the ref-def
  # convention in common.defs.yaml. Local because equip_type is a new content type
  # (see the `equip_type` property comment above).
  equipTypeRef:
    type: string
    pattern: "^([a-z][a-z0-9_]{1,31}:)?equip_type\\.[a-z0-9_]+(\\.[a-z0-9_]+)*$"
