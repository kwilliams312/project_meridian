# meridian/npc@1 — NPCs and mobs (NPC-01, NPC-02, CMB-02)
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "meridian://schema/content/npc.schema.yaml"
type: object
additionalProperties: false
required: [schema, id, name, level, creature_type, faction, stats]
properties:
  schema: { const: "meridian/npc@1" }
  id:
    $ref: "#/$defs/contentId"
    x-meridian-ui:
      group: identity
      label: NPC ID
      widget: single_line
      help: Permanent fully qualified ID owned by this pack; references use this value.
      example: emberfall:npc.ash_guard
      constraint: Use namespace:npc.name with lowercase dot-separated segments.
      documentation: schema/content/README.md
  name:
    $ref: "#/$defs/displayName"
    x-meridian-ui:
      group: identity
      label: Display name
      widget: single_line
      help: Name shown above the NPC and in operator tools.
      example: Ash Guard
  subtitle:
    description: Shown under the name plate, e.g. "Mining Supervisor".
    type: string
    maxLength: 80
  level:
    $ref: "#/$defs/intRange"
    x-meridian-ui:
      group: combat
      label: Level range
      help: Inclusive minimum and maximum level; the server scales stats between them.
      constraint: Minimum must not exceed maximum.
  creature_type:
    enum: [humanoid, beast, undead, elemental, demon, dragonkin, mechanical, critter]
  rank:
    enum: [normal, elite, rare, boss]
    default: normal
  faction:
    description: v1 disposition toward players. Real faction/reputation system is an M2 schema.
    enum: [friendly, neutral, hostile]

  stats:
    description: Explicit v1 stats at level.min; server scales linearly to level.max. statprofile refs arrive M2.
    type: object
    additionalProperties: false
    required: [health, damage, attack_speed_ms]
    properties:
      health:
        type: integer
        minimum: 1
        x-meridian-ui:
          group: combat
          label: Health
          widget: number
          help: Hit points at the minimum authored level.
          constraint: At least 1.
      mana: { type: integer, minimum: 0 }
      armor: { type: integer, minimum: 0 }
      damage: { $ref: "#/$defs/intRange" }
      attack_speed_ms:
        type: integer
        minimum: 500
        x-meridian-ui:
          group: combat
          label: Attack speed
          widget: number
          unit: ms
          help: Delay between basic attacks.
          example: 2000
          constraint: At least 500 milliseconds.

  ai:
    description: Server-side behavior parameters (CMB-02). Ignored for faction=friendly.
    type: object
    additionalProperties: false
    properties:
      behavior:
        description: aggressive = attacks on aggro radius; defensive = retaliates only.
        enum: [aggressive, defensive, passive]
        default: defensive
      aggro_radius_m:
        type: number
        minimum: 0
        maximum: 100
        default: 20
        x-meridian-ui: { group: ai, label: Aggro radius, widget: number, unit: m }
      leash_radius_m:
        type: number
        minimum: 0
        maximum: 500
        default: 60
        x-meridian-ui: { group: ai, label: Leash radius, widget: number, unit: m }
      call_for_help_radius_m:
        type: number
        minimum: 0
        maximum: 100
        default: 0
        x-meridian-ui: { group: ai, label: Call-for-help radius, widget: number, unit: m }
      flee_at_health_pct:
        $ref: "#/$defs/pct"
        x-meridian-ui:
          group: ai
          label: Flee below health
          widget: number
          unit: percent
          help: Health percentage below which this NPC attempts to flee.
          example: 20
          constraint: 0-100 percent.
      abilities:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [ability]
          properties:
            ability:
              $ref: "#/$defs/abilityRef"
              x-meridian-ui:
                group: ai
                label: Ability
                widget: reference_picker
                reference_type: content:ability
                help: Ability ID considered by this NPC's server-side rotation.
                example: core:ability.cleave_strike
                constraint: Use an ability ID, optionally prefixed by another pack namespace.
                documentation: schema/content/README.md
            priority:
              description: Lower = considered first each AI tick.
              type: integer
              minimum: 0
              default: 0
            cooldown_override_ms: { type: integer, minimum: 0 }
            use_at_health_below_pct:
              $ref: "#/$defs/pct"
              x-meridian-ui:
                group: ai
                label: Use below health
                widget: number
                unit: percent
                help: Optional health threshold for considering this ability.
                example: 50
                constraint: 0-100 percent.

  movement:
    type: object
    additionalProperties: false
    properties:
      walk_speed_mps: { type: number, minimum: 0, default: 2.5 }
      run_speed_mps: { type: number, minimum: 0, default: 7.0 }

  interaction:
    type: object
    additionalProperties: false
    properties:
      gossip_text:
        description: Single-page gossip for v1; gossip graphs are an M2 schema.
        type: string
        maxLength: 2000
      vendor: { $ref: "#/$defs/vendorRef" }
      trainer:
        description: >-
          Abilities this NPC teaches (NPC-02). A non-empty list makes the NPC a trainer
          and surfaces the "train" gossip option. Every gate is server-authoritative
          content — the client never supplies cost/level/class (Principle 1).
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [ability, cost]
          properties:
            ability: { $ref: "#/$defs/abilityRef" }
            cost:
              description: Copper cost to learn this ability.
              $ref: "#/$defs/money"
            required_class:
              description: Class gate — only this class may learn the ability. Omit = any class.
              enum: [vanguard, runcaller, warden, mender]
            required_level:
              description: Minimum character level to learn.
              type: integer
              minimum: 1
              default: 1

  loot:
    type: object
    additionalProperties: false
    properties:
      table: { $ref: "#/$defs/lootRef" }
      money:
        description: >-
          Copper dropped by this NPC. Additive with any `money` defined on the referenced
          loot table (decision D-25) — both ranges are rolled and summed.
        $ref: "#/$defs/intRange"

  # RESERVED (contract ① §7): visual becomes a oneOf in @2 — monolithic `model`
  # OR assemble-like-a-player {appearance, worn_items}. Do not design against
  # "NPC visual is always one mesh".
  visual:
    type: object
    additionalProperties: false
    required: [model]
    x-meridian-ui: { group: presentation, label: Visual and audio }
    properties:
      model:
        $ref: "#/$defs/artRef"
        x-meridian-ui:
          group: presentation
          label: Creature model
          widget: asset_picker
          reference_type: asset:art
          help: Art-registry model rendered for this NPC or mob.
          example: core:art.creature.kobold_miner
          constraint: Select a creature_model asset ID; Meshy generation is available when art is missing.
          documentation: schema/content/README.md
        x-meridian-asset:
          allowed_classes: [creature_model]
          eligible_generators: [meshy]
      scale:
        type: number
        exclusiveMinimum: 0
        maximum: 10
        default: 1.0
        x-meridian-ui:
          group: presentation
          label: Model scale
          widget: number
          unit: scale
          help: Multiplier applied to the source model size.
          example: 1.0
          constraint: Greater than 0 and at most 10.
      sound_set:
        $ref: "#/$defs/sfxRef"
        x-meridian-ui:
          group: presentation
          label: Sound set
          widget: asset_picker
          reference_type: asset:sfx
        x-meridian-asset:
          allowed_classes: [sfx]
          eligible_generators: []
