# meridian/appearance_catalog@1 — per race/sex character customization catalog
# (contract ①/T3, spec §5.1). One file per race/sex under content/<ns>/appearance/.
# Preset ids are small integers, stable forever within a catalog — new presets
# append; this additive-only promise is what lets the per-character appearance
# record (§5.2, contract ①/T5) stay forward-compatible (A-03/D-32). M1 ships zero
# morphs; `morphs` is capped at 2 entries per the §2.5 crowd-render budget.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "meridian://schema/content/appearance.schema.yaml"
type: object
additionalProperties: false
required: [schema, id, race, sex, skeleton, body_model, presets]
properties:
  schema: { const: "meridian/appearance_catalog@1" }
  id: { $ref: "#/$defs/contentId" }
  race: { $ref: "#/$defs/raceName" }
  sex: { enum: [male, female] }
  skeleton:
    $ref: "#/$defs/artRef"
    x-meridian-ui:
      group: body
      label: Reference skeleton
      widget: asset_picker
      reference_type: asset:art
      help: Canonical rig used by every body and wearable in this appearance catalog.
    x-meridian-asset:
      allowed_classes: [character_model]
      eligible_generators: []
  body_model:
    $ref: "#/$defs/artRef"
    x-meridian-ui:
      group: body
      label: Character body model
      widget: asset_picker
      reference_type: asset:art
    x-meridian-asset:
      allowed_classes: [character_model]
      eligible_generators: [meshy]
  body_material:
    description: >-
      OPTIONAL recolor material for the body (design 2026-07-14-chibi §6, R2). When
      present, the client renders the body with this material instead of the body
      model's own baked atlas: it MULTIPLIES the neutral `albedo` texture by each
      dyed channel's colour through the RGB `dye_mask` (the same dye-mask path the
      assembler already runs for equipment — dye_tint.gdshader), so only the masked
      region (skin) recolors and the unmasked texels (eyes, cloth) survive. This is
      how a Chibi COLOUR race becomes its colour: one shared grey body + per-race
      dye. Additive and back-compatible — a catalog without `body_material` (e.g.
      the core races, which bake colour into the body model directly) renders exactly
      as before. `metallic`/`roughness` feed the material's PBR params; the shader
      localizes metalness to the mask so a metallic race is metal-skinned but keeps
      matte cloth/eyes.
    type: object
    additionalProperties: false
    required: [albedo, dye_mask, dyes]
    properties:
      albedo:
        description: Recolor-ready base albedo (skin neutralised to grey so a dye reads true).
        $ref: "#/$defs/artRef"
        x-meridian-ui:
          group: body
          label: Recolor base albedo
          widget: asset_picker
          reference_type: asset:art
        x-meridian-asset:
          allowed_classes: [texture_set]
          eligible_generators: []
      dye_mask:
        description: RGB dye mask — R=primary/skin, G=secondary, B=accent; unmasked texels never tint.
        $ref: "#/$defs/artRef"
        x-meridian-ui:
          group: body
          label: Dye mask
          widget: asset_picker
          reference_type: asset:art
        x-meridian-asset:
          allowed_classes: [texture_set]
          eligible_generators: []
      dyes:
        description: >-
          The race's fixed body dyes, one per RGB dye channel (max 3). Each names a
          meridian/dye@1 by id (L011-resolved) whose colour tints that channel's
          masked region. The Chibi colour races use exactly the `primary` channel
          (skin). Channel↔RGB is the dyeChannel order (primary=R, secondary=G, accent=B).
        type: array
        minItems: 1
        maxItems: 3
        items:
          type: object
          additionalProperties: false
          required: [channel, dye]
          properties:
            channel: { $ref: "#/$defs/dyeChannel" }
            dye: { $ref: "#/$defs/dyeRef" }
      metallic:
        description: PBR metalness 0..1 (default 0). Metallic races set 1.0; shader gates it by the mask.
        type: number
        minimum: 0
        maximum: 1
      roughness:
        description: PBR roughness 0..1 (optional; material default when omitted).
        type: number
        minimum: 0
        maximum: 1
  presets:
    description: >-
      Customization set v1 (art-prd §5): hair meshes, face textures, skin
      palettes. Each preset entry's `id` is the stable integer the per-character
      appearance record stores (§5.2) — uniqueness within a list is lint L082.
    type: object
    additionalProperties: false
    required: [hair, face, skin]
    properties:
      hair:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, model]
          properties:
            id: { type: integer, minimum: 1, maximum: 255 }
            model:
              $ref: "#/$defs/artRef"
              x-meridian-ui:
                group: customization
                label: Hair model
                widget: asset_picker
                reference_type: asset:art
              x-meridian-asset:
                allowed_classes: [character_model]
                eligible_generators: [meshy]
      face:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, texture]
          properties:
            id: { type: integer, minimum: 1, maximum: 255 }
            texture:
              $ref: "#/$defs/artRef"
              x-meridian-ui:
                group: customization
                label: Face texture
                widget: asset_picker
                reference_type: asset:art
              x-meridian-asset:
                allowed_classes: [texture_set]
                eligible_generators: []
      skin:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, palette]
          properties:
            id: { type: integer, minimum: 1, maximum: 255 }
            palette:
              $ref: "#/$defs/artRef"
              x-meridian-ui:
                group: customization
                label: Skin palette
                widget: asset_picker
                reference_type: asset:art
              x-meridian-asset:
                allowed_classes: [texture_set]
                eligible_generators: []
  morphs:
    description: >-
      0 at M1; ships only if the §2.5 crowd budget allows (A-03/D-32). Capped at
      2 entries.
    type: array
    maxItems: 2
    items:
      type: object
      additionalProperties: false
      required: [id, name, blendshape, min, max]
      properties:
        # id is the stable per-catalog morph index the per-character appearance
        # record stores on the wire as a uint8 — bound it to the u8 range so an
        # out-of-range id is rejected at authoring time, matching the preset ids
        # above. (min/max below are the blendshape's float weight range, not wire
        # bytes, so they carry no such bound.)
        id: { type: integer, minimum: 1, maximum: 255 }
        name: { $ref: "#/$defs/displayName" }
        blendshape: { type: string, minLength: 1 }
        min: { type: number }
        max: { type: number }
