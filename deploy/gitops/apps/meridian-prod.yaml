# SPDX-License-Identifier: Apache-2.0
# Prod realm — MANUAL sync (design §3): promoting to production is a deliberate
# operator action. No automated syncPolicy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meridian-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kwilliams312/project_meridian.git
    targetRevision: main
    path: deploy/helm/meridian
    helm:
      valueFiles:
        - ../../gitops/realms/prod/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: meridian-prod
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
