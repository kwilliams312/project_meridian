# Prod realm — MANUAL sync (design §3): promoting to production is a deliberate
# operator action. No automated syncPolicy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meridian-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kwilliams312/project_meridian.git
    targetRevision: main
    path: deploy/helm/meridian
    helm:
      valueFiles:
        - ../../gitops/realms/prod/values.yaml
        # Machine-managed immutable image pin (issue #382). The promote workflow
        # copies the PTR-validated <short-sha> into this file on ptr→main; being
        # listed AFTER values.yaml, its tags win. Prod stays MANUAL-sync: ArgoCD
        # shows the manifest diff and an operator triggers the sync (human gate).
        - ../../gitops/realms/prod/image.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: meridian-prod
  ignoreDifferences:
    # StatefulSet volumeClaimTemplates are immutable + apiserver-defaulted
    # (apiVersion/kind/status/volumeMode) — ignore so the SS isn't perma-OutOfSync.
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - '.spec.volumeClaimTemplates'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
