apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meridian-ptr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kwilliams312/project_meridian.git
    targetRevision: ptr
    path: deploy/helm/meridian
    helm:
      valueFiles:
        - ../../gitops/realms/ptr/values.yaml
        # Machine-managed immutable image pin (issue #382). The promote workflow
        # copies the Dev-validated <short-sha> into this file on dev→ptr; being
        # listed AFTER values.yaml, its tags win. ArgoCD drives the ptr rollout
        # off the resulting manifest diff (declarative, like dev) — no
        # rollout-restart hack, so no restartedAt annotation to ignore.
        - ../../gitops/realms/ptr/image.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: meridian-ptr
  ignoreDifferences:
    # StatefulSet volumeClaimTemplates are immutable + apiserver-defaulted
    # (apiVersion/kind/status/volumeMode) — ignore so the SS isn't perma-OutOfSync.
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - '.spec.volumeClaimTemplates'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
