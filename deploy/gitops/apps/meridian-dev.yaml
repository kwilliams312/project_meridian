apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meridian-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kwilliams312/project_meridian.git
    targetRevision: dev
    path: deploy/helm/meridian
    helm:
      valueFiles:
        - ../../gitops/realms/dev/values.yaml
        # Machine-managed immutable image pin (issue #380). cd.yml rewrites the
        # <short-sha> tags in this file on every dev push; being listed AFTER
        # values.yaml, its tags win. ArgoCD sees the resulting manifest diff and
        # drives the rollout itself — no rollout-restart hack, so no restartedAt
        # annotation to ignore.
        - ../../gitops/realms/dev/image.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: meridian-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
