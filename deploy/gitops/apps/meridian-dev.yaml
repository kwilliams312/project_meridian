apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meridian-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kwilliams312/project_meridian.git
    targetRevision: dev
    path: deploy/helm/meridian
    helm:
      valueFiles:
        - ../../gitops/realms/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: meridian-dev
  # cd.yml rollout-restarts the daemons to repull the moving :dev tag; ignore the
  # restartedAt annotation so self-heal doesn't fight (and revert) the restart.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
