# Lets the CD runner rollout-restart the PTR daemons so cd.yml can repull the
# moving :ptr tag. ARC runs each scale set under its own SA
# (<scaleset>-gha-rs-no-permission), NOT arc-runners/default — the cd.yml restart
# job runs on meridian-amd64, so bind THAT SA. Least-privilege: get/list/patch on
# Deployments in the realm namespace only.
#
# NOTE (issue #380): the meridian-dev Role/RoleBinding was removed — dev no longer
# rollout-restarts. Its rollout is GitOps write-back (cd.yml `pin` job commits the
# immutable <short-sha>; ArgoCD reconciles), so the runner needs no cluster RBAC
# in meridian-dev. PTR keeps the interim restart until its own pin lands.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: meridian-restarter
  namespace: meridian-ptr
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meridian-restarter
  namespace: meridian-ptr
subjects:
  - kind: ServiceAccount
    name: meridian-amd64-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  kind: Role
  name: meridian-restarter
  apiGroup: rbac.authorization.k8s.io
