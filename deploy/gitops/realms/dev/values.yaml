# SPDX-License-Identifier: Apache-2.0
# Dev realm (meridian-dev) overlay — ephemeral DB, self-signed TLS, multi-arch
# :dev images (schedule on any node pool). Design §3.
#
# Exposure: authd (:7100) + worldd (:7200) SHARE one MetalLB LoadBalancer IP
# (192.168.89.31) via the metallb allow-shared-ip annotation, so a single realm
# IP reaches both daemons. NOTE: authd does not yet advertise this IP in its
# realm list (the realm DB row) — external real clients need that; tracked in #339.
# The in-cluster load harness reaches the daemons by ClusterIP name regardless.

# Realm content theme (chibi-theme design §4, C9/#762). The dev realm serves the
# CHIBI pack as primary (6 colour races × sex + 4 classes) instead of core: worldd
# gets MERIDIAN_REALM_THEME=chibi ⇒ resolves the chibi world_manifest row as
# primary, retiring the old core roster for this realm. MUST stay in lockstep with
# mariadb.contentSeed.sqlPath below (the chibi single-pack world DB) so the seeded
# content matches the theme worldd resolves. The bot-runner load bots are engine-
# free and theme-agnostic (they char-create roster-position race/class = chibi's
# Red/Warrior); the human's Godot client mounts chibi locally via run-local. ptr/
# prod leave this empty (core) until chibi is promoted onto their branches.
realmTheme: chibi

image:
  # tag is pinned to the immutable <short-sha> by cd.yml write-back — see the
  # machine-managed realms/dev/image.yaml overlay (issue #380). The "dev" here is
  # just the pre-first-build fallback; image.yaml (loaded after this file)
  # overrides it. IfNotPresent is correct for an immutable tag: a unique SHA tag
  # is pulled exactly once per node, with no needless registry round-trip on
  # every pod start (and no moving-tag cache-staleness).
  tag: "dev"
  pullPolicy: IfNotPresent

authd:
  replicaCount: 1
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.31"
      metallb.universe.tf/allow-shared-ip: "meridian-dev"
  probes: { type: tcp }
worldd:
  replicaCount: 1
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.31"
      metallb.universe.tf/allow-shared-ip: "meridian-dev"
  probes: { type: tcp }
  # At M0 worldd plays the gateway role and CONSUMES the IF-3 session_grant from
  # the auth DB (server/worldd/world_session.cpp validate_and_consume_grant).
  # The chart default worldd.db.enabled=false ("no DB at M0") is wrong for that —
  # without meridian_auth access worldd rejects every grant as GRANT_INVALID(3).
  db:
    enabled: true
    name: meridian_auth
  # Server-authoritative characters (D-35/#341): worldd loads the REAL character
  # from meridian_characters on ENTER_WORLD to validate ownership + spawn. Without
  # this, every ENTER_WORLD returns INTERNAL and the realm is unenterable (the
  # placeholder fabrication is gone). Renders all five MERIDIAN_CHARDB_* vars.
  chardb:
    enabled: true
    name: meridian_characters
  # World/CONTENT DB (#482): worldd loads the mcc-emitted content stores (#390 npc/
  # quest/loot/vendor/item + #483 DbAbilityStore) from meridian_world at boot.
  # Without this, worldd logs "no world DB configured … serving without content"
  # and the realm has NO abilities/quests/npcs/loot/vendors (casting → UNKNOWN).
  # Renders all five MERIDIAN_WORLDDB_* vars; content is seeded by mariadb.contentSeed.
  worlddb:
    enabled: true
    name: meridian_world

tls:
  mode: selfSignedInit

db:
  password: "meridian"

mariadb:
  enabled: true
  image: { tag: "dev" }
  # Durable storage (#520, root cause of #510): with emptyDir, every mariadb pod
  # restart wiped the `realm` row + world content until the one-shot seed hooks
  # re-ran on the next Helm sync — a window where every login got an empty realm
  # list and no client could enter. A PVC (StatefulSet, longhorn) makes the realm
  # row, accounts, and world content survive restarts. The seed-on-every-sync
  # below is now belt-and-suspenders (idempotent) rather than the only line of
  # defense; it can be retired when the admin portal (#339) lands.
  persistence: { enabled: true, storageClass: "longhorn", size: "8Gi" }
  # Content seed → the CHIBI single-pack world DB (C9/#762), matching realmTheme
  # above. The meridian-db image bakes /content/world-content-chibi.sql (Dockerfile.db
  # `emit-sql content --pack chibi`); pointing the content-seed Job at it loads
  # chibi's world_manifest row (one pack ⇒ no core+chibi roster_id collision) into
  # meridian_world, so worldd's theme=chibi primary resolves and the seed's IF-4
  # hash-gate ties to the chibi row. Default (core) realms leave this unset.
  contentSeed:
    sqlPath: /content/world-content-chibi.sql

# SHORT-TERM: seed the realm row (→ the shared LB IP) + devtester on every sync,
# so the ephemeral dev DB is usable without hand-seeding. Remove when the admin
# web portal lands (#339). Realm address defaults to .31 (the dev LB IP).
seed:
  enabled: true

# Persistent bot players (#487): 4 headless meridian-bot sessions login → enter
# world → walk, class-rotated (1..4) so the #328 capsule colours differ. So a real
# client entering the dev realm sees other players via AoI. Dev only — PTR/Prod
# leave botRunner disabled (chart default). Points at the in-cluster worldd Service.
botRunner:
  enabled: true
  count: 4
