# SPDX-License-Identifier: Apache-2.0
# Dev realm (meridian-dev) overlay — ephemeral DB, self-signed TLS, NodePort,
# multi-arch :dev images (schedule on any node pool). Design §3.
image:
  tag: "dev"                # moving per-branch tag, published multi-arch by cd.yml
  pullPolicy: Always

authd:
  replicaCount: 1
  service: { type: NodePort, nodePort: 31710 }
  probes: { type: tcp }
worldd:
  replicaCount: 1
  service: { type: NodePort, nodePort: 31720 }
  probes: { type: tcp }

tls:
  mode: selfSignedInit

db:
  password: "meridian"

mariadb:
  enabled: true
  image: { tag: "dev" }
  persistence: { enabled: false }
