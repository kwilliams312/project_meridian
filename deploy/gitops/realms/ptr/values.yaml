# SPDX-License-Identifier: Apache-2.0
# PTR realm (meridian-ptr) — persistent Longhorn MariaDB, :ptr multi-arch images,
# self-signed TLS. authd+worldd share MetalLB IP 192.168.89.32. Auto-synced from ptr.
image:
  # tag is pinned to the immutable <short-sha> carried by promotion — see the
  # machine-managed realms/ptr/image.yaml overlay (issue #382). The "ptr" here is
  # just the pre-first-promotion fallback; image.yaml (loaded after this file)
  # overrides it. IfNotPresent is correct for an immutable tag: a unique SHA tag
  # is pulled exactly once per node, with no needless registry round-trip on
  # every pod start (and no moving-tag cache-staleness).
  tag: "ptr"
  pullPolicy: IfNotPresent
authd:
  replicaCount: 2
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.32"
      metallb.universe.tf/allow-shared-ip: "meridian-ptr"
  probes: { type: tcp }
worldd:
  replicaCount: 2
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.32"
      metallb.universe.tf/allow-shared-ip: "meridian-ptr"
  probes: { type: tcp }
  db:                      # worldd consumes IF-3 grants from meridian_auth at M0
    enabled: true
    name: meridian_auth
  chardb:                  # ENTER_WORLD loads real characters (D-35/#341); all 5 CHARDB vars
    enabled: true
    name: meridian_characters
  worlddb:                 # world/CONTENT DB (#482): #390 DB stores + #483 DbAbilityStore; all 5 WORLDDB vars
    enabled: true
    name: meridian_world
tls:
  mode: selfSignedInit
db:
  password: "meridian"
mariadb:
  enabled: true
  image: { tag: "ptr" }
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 8Gi
# SHORT-TERM seed (like dev) so PTR is testable; realm advertises the PTR LB IP.
# Remove when the admin web portal lands (#339).
seed:
  enabled: true
  accountImage: { tag: "ptr" }
  realm:
    name: "PTR"
    address: "192.168.89.32"
    port: 7200
