# SPDX-License-Identifier: Apache-2.0
# Prod realm (meridian-prod) — persistent Longhorn MariaDB, :prod multi-arch,
# self-signed TLS. authd+worldd share MetalLB IP 192.168.89.33. Manual-sync.
image:
  # tag is pinned to the immutable <short-sha> carried by promotion — see the
  # machine-managed realms/prod/image.yaml overlay (issue #382). The "prod" here
  # is just the pre-first-promotion fallback; image.yaml (loaded after this file)
  # overrides it. IfNotPresent is correct for an immutable tag: a unique SHA tag
  # is pulled exactly once per node, with no needless registry round-trip on
  # every pod start (and no moving-tag cache-staleness).
  tag: "prod"
  pullPolicy: IfNotPresent
authd:
  replicaCount: 3
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.33"
      metallb.universe.tf/allow-shared-ip: "meridian-prod"
  probes: { type: tcp }
worldd:
  replicaCount: 3
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.33"
      metallb.universe.tf/allow-shared-ip: "meridian-prod"
  probes: { type: tcp }
  db:                      # worldd consumes IF-3 grants from meridian_auth at M0
    enabled: true
    name: meridian_auth
  chardb:                  # ENTER_WORLD loads real characters (D-35/#341); all 5 CHARDB vars
    enabled: true
    name: meridian_characters
tls:
  mode: selfSignedInit
db:
  password: "meridian"
mariadb:
  enabled: true
  image: { tag: "prod" }
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 20Gi
# NO seed on Prod — real provisioning (admin portal / #339), no test accounts.
