# SPDX-License-Identifier: Apache-2.0
# Prod realm (meridian-prod) — persistent Longhorn MariaDB, :prod multi-arch,
# self-signed TLS. authd+worldd share MetalLB IP 192.168.89.33. Manual-sync.
image:
  tag: "prod"
  pullPolicy: Always
authd:
  replicaCount: 3
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.33"
      metallb.universe.tf/allow-shared-ip: "meridian-prod"
  probes: { type: tcp }
worldd:
  replicaCount: 3
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.89.33"
      metallb.universe.tf/allow-shared-ip: "meridian-prod"
  probes: { type: tcp }
  db:                      # worldd consumes IF-3 grants from meridian_auth at M0
    enabled: true
    name: meridian_auth
  chardb:                  # ENTER_WORLD loads real characters (D-35/#341); all 5 CHARDB vars
    enabled: true
    name: meridian_characters
tls:
  mode: selfSignedInit
db:
  password: "meridian"
mariadb:
  enabled: true
  image: { tag: "prod" }
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 20Gi
# NO seed on Prod — real provisioning (admin portal / #339), no test accounts.
