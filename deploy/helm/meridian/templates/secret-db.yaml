{{- /* SPDX-License-Identifier: Apache-2.0 */ -}}
{{- /*
  DB credentials Secret (chart-created variant). Only rendered when the operator
  does NOT supply db.existingSecret — the recommended production path is an
  externally-managed Secret (external-secrets operator, sealed-secrets, etc.),
  matching the "TLS/creds are per-deployment, never committed" posture of the
  compose (deploy/docker/certs/README.md). The daemons read MERIDIAN_DB_PASS.
*/ -}}
{{- if not .Values.db.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meridian.dbSecretName" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  {{- with (include "meridian.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  MERIDIAN_DB_PASS: {{ required "db.password is required when db.existingSecret is not set" .Values.db.password | quote }}
{{- end }}
