{{- /* SPDX-License-Identifier: Apache-2.0 */ -}}
{{- /*
  Non-secret 12-factor config shared by the daemons: the MERIDIAN_DB_* host/port/
  user (NOT the password — that lives in the Secret) and, when observability is
  enabled, the metrics knobs. Same env names the daemons read in the compose
  (deploy/docker/docker-compose.yml) — the chart is a config-only consumer
  (D-30 §10 rule 3).
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "meridian.configMapName" . }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  {{- with (include "meridian.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  MERIDIAN_DB_HOST: {{ include "meridian.db.host" . | quote }}
  MERIDIAN_DB_PORT: {{ .Values.db.port | quote }}
  MERIDIAN_DB_USER: {{ .Values.db.user | quote }}
  {{- if .Values.observability.enabled }}
  MERIDIAN_METRICS_PORT: {{ .Values.observability.metricsPort | quote }}
  MERIDIAN_METRICS_BIND: {{ .Values.observability.metricsBind | quote }}
  MERIDIAN_REALM: {{ .Values.observability.realm | default .Release.Name | quote }}
  {{- end }}
