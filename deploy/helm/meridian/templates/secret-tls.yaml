{{- /* SPDX-License-Identifier: Apache-2.0 */ -}}
{{- /*
  TLS Secret (chart-created variant). IF-1 (authd) and IF-2 (worldd at M0) are
  both TLS 1.3 listeners; each mounts a server.crt / server.key at /certs, exactly
  as the compose does. Only rendered when tls.create=true. Production deployments
  leave tls.create=false and reference an operator-PKI / cert-manager Secret via
  tls.existingSecret (SAD §5.1). Provide PEM material with:
    --set tls.create=true --set-file tls.cert=server.crt --set-file tls.key=server.key
*/ -}}
{{- if .Values.tls.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-tls" (include "meridian.fullname" .) }}
  labels:
    {{- include "meridian.labels" . | nindent 4 }}
  {{- with (include "meridian.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.tls.certKey }}: |
    {{- required "tls.cert is required when tls.create=true (use --set-file tls.cert=server.crt)" .Values.tls.cert | nindent 4 }}
  {{ .Values.tls.keyKey }}: |
    {{- required "tls.key is required when tls.create=true (use --set-file tls.key=server.key)" .Values.tls.key | nindent 4 }}
{{- end }}
