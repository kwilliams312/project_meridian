# Meshy auto-rig → canonical Meridian skeleton bone map (spec ④ §7.3).
#
# Keyed by Meshy model version (their rig naming can drift between releases).
# Each version block maps a Meshy rig bone name → the canonical bone name from
# tools/blender/meridian_rig/bones.py (the same 56 Godot SkeletonProfileHumanoid
# bones + 7 sockets that skeleton.defs.yaml enumerates). `meshy convert-rig`
# renames mapped bones and merges unmapped helper/twist bones into their nearest
# mapped ancestor; a bone with no entry and no mapped-ancestor prefix is a hard,
# listed error.
#
# ─────────────────────────────────────────────────────────────────────────────
# RECONCILED against a live Meshy rig (story #916 spike / #918), 2026-07-17.
#
# The seed (story #506) had to GUESS the bone names — Meshy does not publish them
# and no live sample was then available — assuming Mixamo-style naming with the
# `mixamorig:` prefix stripped. Story #916 ran one controlled live rig and read
# the real names back via `mapping.joint_names_from_glb`. Findings (24 bones):
#
#   • 19 / 24 matched the guess exactly (Hips, the limb/shoulder/hand chains,
#     Spine, Head) — no change needed.
#   • 5 diverged and are now reconciled here:
#       - Spine1  → **Spine01**  (Meshy zero-pads the numbering)  → Chest
#       - Spine2  → **Spine02**  (zero-padded)                    → UpperChest
#       - Neck    → **neck**     (lowercase)                      → Neck
#       - HeadTop_End → **head_end**  — a head TIP bone with no canonical target
#       - (extra) → **headfront**     — a Meshy-specific head helper, no target
#     `head_end`/`headfront` are DROPPED (left out of the table): the canonical
#     spine terminates at `Head` (no tip bone), so neither has a canonical
#     destination. Drop, not merge: they are lowercase and do NOT token-match the
#     mapped `Head` prefix, so the automatic helper-merge cannot reach them, and
#     an explicit entry → `Head` would collide (multiple sources → one target) on
#     the mesh vertex-group path. For CLIP retarget they carry no motion (leaf
#     tips) so dropping is lossless; for MESH onboarding they surface in the
#     plan's `unmapped` list (a hard, listed error) rather than mis-binding.
#   • Rest orientation is a **T-pose** (inverse-bind matrices: arms extend
#     laterally ±X, ~horizontal). This MATCHES the canonical `bones.py` rest
#     (RightUpperArm head→tail runs along +X at constant Y=1.42), so the
#     geometric re-pose #524 worried about is identity/minimal — CONFIRMED, not
#     assumed, against the seed skeleton.
#
# The finger entries below remain a BEST-EFFORT GUESS: the spike mesh had mitten
# hands (no finger bones), so their live names are still unconfirmed. Locomotion
# clips do not animate fingers, so this does not block clip retarget.
#
# CLIP retarget (tools/blender/meridian_rig/retarget_clip.py) consumes this table
# via `load_meshy_map` and does NOT gate on `verified` — the reconciled names
# above make Meshy clips retargetable NOW.
#
# `verified` stays **false** BY DESIGN. That flag gates convert-rig MESH
# onboarding (#524), which is a SEPARATE concern this story does not close: the
# head-tip mesh disposition and the geometric re-pose validation still need the
# #524 slice. Do not read the clip-retarget reconciliation as mesh-onboarding
# verification. `convert-rig` therefore still REFUSES this version without
# `--allow-unverified-map`.
#
# `verified:` must be a bare YAML boolean — a quoted "true"/"false" string is
# refused outright (mapping.load_map raises), never coerced.
# ─────────────────────────────────────────────────────────────────────────────

versions:
  # Meshy's current pinned model (matches client.DEFAULT_MODEL_VERSION = meshy-5).
  meshy-5:
    verified: false
    bones:
      # --- Spine column ---
      # Reconciled against the live spike (story #916/#918): Meshy zero-pads the
      # spine numbering (Spine01/Spine02, NOT the Mixamo Spine1/Spine2) and emits
      # a lowercase `neck`. Canonical targets are unchanged from the seed.
      Hips: Hips
      Spine: Spine
      Spine01: Chest
      Spine02: UpperChest
      neck: Neck
      Head: Head
      # head_end / headfront (Meshy head tip + face-front helper) are DROPPED —
      # intentionally absent. See the reconciliation note in the header.

      # --- Left arm + hand ---
      LeftShoulder: LeftShoulder
      LeftArm: LeftUpperArm
      LeftForeArm: LeftLowerArm
      LeftHand: LeftHand
      LeftHandThumb1: LeftThumbMetacarpal
      LeftHandThumb2: LeftThumbProximal
      LeftHandThumb3: LeftThumbDistal
      LeftHandIndex1: LeftIndexProximal
      LeftHandIndex2: LeftIndexIntermediate
      LeftHandIndex3: LeftIndexDistal
      LeftHandMiddle1: LeftMiddleProximal
      LeftHandMiddle2: LeftMiddleIntermediate
      LeftHandMiddle3: LeftMiddleDistal
      LeftHandRing1: LeftRingProximal
      LeftHandRing2: LeftRingIntermediate
      LeftHandRing3: LeftRingDistal
      LeftHandPinky1: LeftLittleProximal
      LeftHandPinky2: LeftLittleIntermediate
      LeftHandPinky3: LeftLittleDistal

      # --- Right arm + hand ---
      RightShoulder: RightShoulder
      RightArm: RightUpperArm
      RightForeArm: RightLowerArm
      RightHand: RightHand
      RightHandThumb1: RightThumbMetacarpal
      RightHandThumb2: RightThumbProximal
      RightHandThumb3: RightThumbDistal
      RightHandIndex1: RightIndexProximal
      RightHandIndex2: RightIndexIntermediate
      RightHandIndex3: RightIndexDistal
      RightHandMiddle1: RightMiddleProximal
      RightHandMiddle2: RightMiddleIntermediate
      RightHandMiddle3: RightMiddleDistal
      RightHandRing1: RightRingProximal
      RightHandRing2: RightRingIntermediate
      RightHandRing3: RightRingDistal
      RightHandPinky1: RightLittleProximal
      RightHandPinky2: RightLittleIntermediate
      RightHandPinky3: RightLittleDistal

      # --- Left leg ---
      LeftUpLeg: LeftUpperLeg
      LeftLeg: LeftLowerLeg
      LeftFoot: LeftFoot
      LeftToeBase: LeftToes

      # --- Right leg ---
      RightUpLeg: RightUpperLeg
      RightLeg: RightLowerLeg
      RightFoot: RightFoot
      RightToeBase: RightToes
