; Meridian client — Godot export presets (issue #113).
;
; ONE macOS Apple-Silicon (arm64) export preset, pinned to the engine in
; client/ENGINE_VERSION (GODOT_VERSION=4.7-stable). This is the preset the
; export CI job (.github/workflows/client.yml → client-export) drives with
;   godot --headless --export-debug "macOS arm64" <out.app>
; after seeding .godot/ once windowed (the #283 MoltenVK cold-import caveat).
;
; Signing (M0): ad-hoc only. codesign/codesign=1 selects Godot's built-in
; signer and codesign/identity="-" makes it an ad-hoc signature — NO Developer
; ID, NO notarization (notarization/notarization=0). That is the M0 policy
; (Client SAD §9.6 / #113): the .app runs locally on the owner/dev box after the
; usual first-run Gatekeeper allow; real Developer-ID signing + notarization is a
; later-milestone concern, deliberately out of scope here.
;
; arm64 only — NO universal2 (no Intel Macs in scope, SAD §9.6 / D-28), matching
; the single-arch GDExtension the client builds. The exported .app loads the
; **template_debug** framework variant of the GDExtension (res://bin/
; libmeridian.macos.template_debug.framework), NOT the editor variant (#300) —
; project/meridian.gdextension maps macos.debug → that framework, and Godot
; bundles it into the .app so the export runs standalone.
;
; export_path is a convenience default for an interactive editor export; the CI
; job passes the real output path on the command line (which overrides this).

[preset.0]

name="macOS arm64"
platform="macOS"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="../../build/export/macos/ProjectMeridian.app"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

