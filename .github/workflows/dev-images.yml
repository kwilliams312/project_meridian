# SPDX-License-Identifier: Apache-2.0
#
# Phase-1 dev-realm image bootstrap (D-37, SYNC §16). Builds the amd64 images the
# `meridian-dev` realm consumes and publishes the moving `:dev` tag to GHCR:
#   - meridian-db  (self-seeding MariaDB; also tagged :latest)
#   - authd, worldd  (built from THIS branch's source via the parameterized
#                     Dockerfile — so :dev reflects dev, not a retag of main)
#
# Phase 2 folds this into cd.yml as native multi-arch matrix legs across all
# realm branches (dev/ptr/main); this focused workflow just gets Dev live now.
# amd64-only for Phase 1 (the dev realm pins pods to amd64 nodes).
name: dev-images

on:
  workflow_dispatch: {}
  push:
    branches: [dev]
    paths:
      - deploy/docker/**
      - server/**
      - schema/**
      - .github/workflows/dev-images.yml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER_REPO: kwilliams312/project_meridian

jobs:
  # ── meridian-db: build, smoke-test the 3-DB self-seed, then publish ─────────
  meridian-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The verify script builds `meridian-db:test` and asserts the auth/
      # characters/world schemas seed on first boot. It is the image's test.
      - name: Smoke — build + assert the 3-DB split seeds
        run: |
          chmod +x deploy/docker/db-init/verify-meridian-db.sh
          deploy/docker/db-init/verify-meridian-db.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag + push :dev and :latest
        run: |
          img="${REGISTRY}/${OWNER_REPO}/meridian-db"
          docker tag meridian-db:test "${img}:dev"
          docker tag meridian-db:test "${img}:latest"
          docker push "${img}:dev"
          docker push "${img}:latest"

  # ── authd / worldd: build from this branch's source, publish :dev ──────────
  daemons:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        daemon: [authd, worldd]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push ${{ matrix.daemon }}:dev (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          build-args: |
            DAEMON=${{ matrix.daemon }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_REPO }}/${{ matrix.daemon }}:dev
          cache-from: type=gha,scope=${{ matrix.daemon }}
          cache-to: type=gha,scope=${{ matrix.daemon }},mode=max
