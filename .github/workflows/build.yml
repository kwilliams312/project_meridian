# Linux build CI (#58) — compiles the C++20 server daemons and the mcc content
# compiler on ubuntu-latest, then smoke-runs each binary's --version/--help.
# Configures with explicit -S/-B paths (not CMakePresets) to sidestep
# preset-cwd quirks on the runner.
name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # flatc + runtime for libmeridian-proto (#67); libssl-dev for libmeridian-srp
      # (#78); libmariadb-dev for libmeridian-db (#75). All picked up by
      # find_package / pkg-config when configuring the full server tree.
      - name: Install toolchain (cmake, ninja, g++-13, flatc, openssl, mariadb-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 flatbuffers-compiler libflatbuffers-dev libssl-dev libmariadb-dev
      - name: Configure
        run: cmake -S server -B server/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
      - name: Build
        run: cmake --build server/build
      - name: Smoke-run authd
        run: ./server/build/authd/authd --version
      - name: Smoke-run worldd
        run: ./server/build/worldd/worldd --version
      # SRP-6a crypto correctness: RFC 5054 Appendix B vectors + round-trip (#78).
      - name: Test SRP-6a (RFC 5054 vectors)
        run: ctest --test-dir server/build --output-on-failure

  mcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (cmake, ninja, g++-13)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13
      - name: Configure
        run: cmake -S tools/mcc -B tools/mcc/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
      - name: Build
        run: cmake --build tools/mcc/build
      - name: Smoke-run mcc --version
        run: ./tools/mcc/build/mcc --version
      - name: Smoke-run mcc --help
        run: ./tools/mcc/build/mcc --help

  # libmeridian-db (#75): build + run its integration test against a real
  # MariaDB service — proves the connection + prepared-statement layer works,
  # including injection safety (a quote-bearing value round-trips verbatim).
  db:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci
          MARIADB_DATABASE: dbtest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + deps (incl. libmariadb-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 flatbuffers-compiler libflatbuffers-dev libssl-dev libmariadb-dev
      - name: Build meridian-db-test
        run: |
          cmake -S server -B server/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          cmake --build server/build --target meridian-db-test
      - name: Run DB integration test (MariaDB service)
        env:
          MERIDIAN_DB_HOST: 127.0.0.1
          MERIDIAN_DB_PORT: 3306
          MERIDIAN_DB_USER: root
          MERIDIAN_DB_PASS: ci
          MERIDIAN_DB_NAME: dbtest
        run: ./server/build/libs/db/meridian-db-test

  # meridian-account CLI (#80, ACC-03): build + run its integration test against
  # a real MariaDB service. Loads the auth schema (0001_init_auth.up.sql) so the
  # `account` table exists, creates an account through the CLI's code path, then
  # runs a full SRP-6a exchange proving the stored credential authenticates the
  # correct password and rejects a wrong one. The plain `server` job's ctest
  # skips this test (no MERIDIAN_DB_* env) — it is inert there.
  account:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci
          MARIADB_DATABASE: meridian_auth
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + deps (incl. libmariadb-dev, libssl-dev, mariadb client)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 flatbuffers-compiler libflatbuffers-dev libssl-dev libmariadb-dev mariadb-client
      - name: Load auth schema (0001_init_auth.up.sql)
        run: |
          mariadb -h 127.0.0.1 -P 3306 -u root -pci meridian_auth < server/db/auth/migrations/0001_init_auth.up.sql
      - name: Build meridian-account-test
        run: |
          cmake -S server -B server/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          cmake --build server/build --target meridian-account meridian-account-test
      - name: Run account-CLI integration test (MariaDB service)
        env:
          MERIDIAN_DB_HOST: 127.0.0.1
          MERIDIAN_DB_PORT: 3306
          MERIDIAN_DB_USER: root
          MERIDIAN_DB_PASS: ci
          MERIDIAN_DB_NAME: meridian_auth
        run: ./server/build/tools/meridian-account/meridian-account-test

  # authd IF-1 login flow (#79): the capstone end-to-end auth path. Builds + runs
  # the login integration test against a real MariaDB service with the auth schema
  # loaded. It stands the REAL meridian-net TLS 1.3 listener + the login state
  # machine on an ephemeral port, drives a full IF-1 login over TLS 1.3 with a real
  # SRP-6a client (meridian-srp testing::client_side), and asserts: a full login
  # succeeds (ClientHello -> ServerHello -> SRP -> AuthResult(M2) -> RealmList ->
  # SessionGrant), the session_grant is written + single-use (atomic consume: 1 row
  # then 0), and a wrong password is rejected with NO grant. The plain `server`
  # job's ctest skips this test (no MERIDIAN_DB_* env) — it is inert there.
  authd:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci
          MARIADB_DATABASE: meridian_auth
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + deps (flatc, libssl-dev, libmariadb-dev, mariadb client)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 flatbuffers-compiler libflatbuffers-dev libssl-dev libmariadb-dev mariadb-client
      - name: Load auth schema (0001_init_auth.up.sql)
        run: |
          mariadb -h 127.0.0.1 -P 3306 -u root -pci meridian_auth < server/db/auth/migrations/0001_init_auth.up.sql
      - name: Build authd-login-test
        run: |
          cmake -S server -B server/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          cmake --build server/build --target authd authd-login-test
      - name: Run authd end-to-end login test (MariaDB service)
        env:
          MERIDIAN_DB_HOST: 127.0.0.1
          MERIDIAN_DB_PORT: 3306
          MERIDIAN_DB_USER: root
          MERIDIAN_DB_PASS: ci
          MERIDIAN_DB_NAME: meridian_auth
        run: ./server/build/authd/authd-login-test

  # worldd IF-3 session establishment (#84): the authd->worldd handoff. Builds +
  # runs the session integration test against a real MariaDB service with the auth
  # schema loaded. It seeds a session_grant row exactly as authd writes it, stands
  # the REAL meridian-net TLS 1.3 listener + the REAL worldd serve loop / WORLD_HELLO
  # handler on an ephemeral port, sends WorldHello{grant_id}, and asserts: the grant
  # is validated + atomically consumed (single-use: consumed_at set once, unchanged
  # on replay) and the server replies HandshakeOk; a replayed / expired / unknown /
  # wrong-realm grant is rejected with Disconnect and no (second) consume; and the
  # AEAD ChaCha20-Poly1305 session seals+opens a frame and rejects a tampered one.
  # The plain `server` job's ctest runs only the pure AEAD half of this test (no
  # MERIDIAN_DB_* env) — the grant-consume DB checks are inert there.
  worldd-session:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci
          MARIADB_DATABASE: meridian_auth
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + deps (flatc, libssl-dev, libmariadb-dev, mariadb client)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 flatbuffers-compiler libflatbuffers-dev libssl-dev libmariadb-dev mariadb-client
      - name: Load auth schema (0001_init_auth.up.sql)
        run: |
          mariadb -h 127.0.0.1 -P 3306 -u root -pci meridian_auth < server/db/auth/migrations/0001_init_auth.up.sql
      - name: Build worldd-session-test + worldd-relay-test
        run: |
          cmake -S server -B server/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          cmake --build server/build --target worldd worldd-session-test worldd-relay-test
      - name: Run worldd IF-3 session establishment test (MariaDB service)
        env:
          MERIDIAN_DB_HOST: 127.0.0.1
          MERIDIAN_DB_PORT: 3306
          MERIDIAN_DB_USER: root
          MERIDIAN_DB_PASS: ci
          MERIDIAN_DB_NAME: meridian_auth
        run: ./server/build/worldd/worldd-session-test
      # worldd Grid/AoI engine v0 + movement relay (#87): the IT-M0 "two clients
      # see each other move" capstone. Two real TLS sessions consume two grants,
      # both enter world near each other; A moves -> B gets A's EntityEnter then
      # EntityUpdate at A's new position; A moves out of AoI range -> B gets
      # EntityLeave. Same mariadb service + auth schema as the session test; the
      # pure grid/interest logic runs DB-free in the `server` job's ctest
      # (worldd-aoi).
      - name: Run worldd AoI two-session relay test (MariaDB service)
        env:
          MERIDIAN_DB_HOST: 127.0.0.1
          MERIDIAN_DB_PORT: 3306
          MERIDIAN_DB_USER: root
          MERIDIAN_DB_PASS: ci
          MERIDIAN_DB_NAME: meridian_auth
        run: ./server/build/worldd/worldd-relay-test
