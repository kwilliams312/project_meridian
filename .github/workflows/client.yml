# Client build CI (#112) — the FIRST client-side CI job. Builds the Godot
# GDExtension for macOS **arm64** on the self-hosted Apple-Silicon runner and
# proves the engine-agnostic client cores (net + bot + movement/interp/telemetry)
# compile clean and pass their ctest suites on arm64 — closing the gap where
# those tests (clientnet-test's 77 checks, the bot FSM/session tests, the
# GDExtension core tests) never ran in CI (all other jobs are ubuntu-latest).
#
# Runner reality (A-16) — TWO gotchas on the "MacOS-M1" box:
#   1. It registers with the label set `[self-hosted, macOS]` — it does NOT
#      advertise an `arm64`/`ARM64` label. So we select on `[self-hosted, macOS]`.
#   2. The Actions runner PROCESS runs under **Rosetta 2**, so `uname -m` reports
#      `x86_64` inside a step even though the hardware is Apple Silicon. Therefore
#      we NEVER gate on `uname -m`. We detect Apple Silicon Rosetta-proof via
#      `sysctl -n hw.optional.arm64` (== 1 on Apple Silicon even from an x86_64
#      process) and we run the toolchain natively with `arch -arm64 <cmd>` (which
#      re-spawns cmake/ctest as native arm64 from the Rosetta host). We ALSO pass
#      `-DCMAKE_OSX_ARCHITECTURES=arm64` as belt-and-suspenders, and assert every
#      produced binary is `arm64` via lipo so a silent x86_64 build can't pass.
#
# Crypto note: the client net core (client/net) + login core use **OpenSSL**
# (TLS 1.3 + SRP-6a + ChaCha20-Poly1305/HKDF), NOT mbedTLS — there is no mbedTLS
# in the tree. This job is what verifies OpenSSL builds/links clean under -arch
# arm64 (alignment/NEON in the FlatBuffers codec + the OpenSSL net core).
name: client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'schema/net/**'
      - 'server/libs/srp/**'
      - 'scripts/dev/_common.sh'
      - '.github/workflows/client.yml'
  pull_request:
    paths:
      - 'client/**'
      - 'schema/net/**'
      - 'server/libs/srp/**'
      - 'scripts/dev/_common.sh'
      - '.github/workflows/client.yml'
  # Nightly macOS arm64 client export (#113): a fresh export artifact every night,
  # before the nightly-manifest run (07:05 UTC) that pins its version+hash into the
  # build manifest (#62/#307). Also on-demand via the Actions "Run workflow" button.
  schedule:
    - cron: "40 6 * * *"
  workflow_dispatch:

# One self-hosted Mac — cancel superseded runs on the same ref so a push doesn't
# queue behind stale work.
concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Engine-agnostic client cores + their ctest suites (arm64) -------------
  # No godot-cpp needed: client/CMakeLists.txt returns early when any of the
  # MERIDIAN_CLIENT_NET / MERIDIAN_BOT / MERIDIAN_CLIENT_TESTS options is ON, so
  # this job builds ONLY the plain-C++17 cores + tests. This is the coverage that
  # was missing from CI. Fast (~1 min), and independent signal from the heavier
  # GDExtension job below.
  client-cores:
    # Push/PR coverage only — the nightly schedule exists solely to cut the export
    # artifact below, not to re-run the core ctest suites.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS]
    steps:
      # The self-hosted runner's Actions shell starts with a minimal PATH that
      # excludes /opt/homebrew/bin (Actions does NOT source the login shell), so
      # brew-installed cmake/ninja/flatc aren't found. Prepend the Apple-Silicon
      # Homebrew bin/sbin via $GITHUB_PATH — this persists for every later step.
      - name: Put Homebrew (arm64) on PATH
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
      # Install the toolchain rather than assuming the runner has it — a
      # self-hosted runner is not guaranteed to have ninja/flatc. brew install is
      # a no-op when already present; `|| true` swallows the nonzero some brew
      # versions return for "already installed".
      - name: Ensure build tools (arm64 Homebrew)
        run: HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 brew install flatbuffers openssl@3 || true
      - uses: actions/checkout@v4
        # No submodules: the engine-agnostic cores never touch godot-cpp.
      # Runs in the runner's own (Rosetta x86_64) process on purpose, so the log
      # shows the real environment: `uname -m` = x86_64, yet hw.optional.arm64 = 1.
      - name: Verify Apple-Silicon host (Rosetta-proof) + toolchain
        run: |
          echo "runner process uname -m : $(uname -m)"        # x86_64 under Rosetta on MacOS-M1
          arm="$(sysctl -n hw.optional.arm64 2>/dev/null || echo 0)"
          echo "hw.optional.arm64       : $arm"
          test "$arm" = "1" || { echo "::error::not Apple Silicon (hw.optional.arm64=$arm)"; exit 1; }
          echo "arch -arm64 uname -m    : $(arch -arm64 uname -m)"   # arm64 — native toolchain reachable
          for t in cmake flatc; do
            command -v "$t" >/dev/null || { echo "::error::missing $t"; exit 1; }
          done
          arch -arm64 cmake --version | head -1
      # Reuse the canonical Homebrew CMake env (openssl@3 + flatbuffers keg-only
      # prefixes, libmariadb pkg-config) from the dev toolkit so CI matches local.
      # Resolved under arch -arm64 so brew yields the arm64 (/opt/homebrew) prefixes.
      - name: Configure Homebrew CMake env (arm64 prefixes)
        run: |
          # brew resolves the /opt/homebrew (arm64) prefixes regardless of the
          # host process arch, so this needs no arch wrapper.
          # shellcheck source=/dev/null
          source scripts/dev/_common.sh
          setup_cmake_env
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
      # arch -arm64 re-spawns cmake as native arm64 (escapes the Rosetta host);
      # -DCMAKE_OSX_ARCHITECTURES=arm64 additionally forces arm64 output.
      - name: Configure client cores (native arm64)
        run: |
          arch -arm64 cmake -S client -B build/client-cores \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DMERIDIAN_CLIENT_NET=ON \
            -DMERIDIAN_BOT=ON \
            -DMERIDIAN_CLIENT_TESTS=ON
      - name: Build client cores (native arm64)
        run: arch -arm64 cmake --build build/client-cores -j "$(sysctl -n hw.ncpu)"
      # Hard gate: every test binary must really be arm64 (not an x86_64/Rosetta
      # build). lipo/file inspect the file, so this needs no arch wrapper.
      - name: Assert built binaries are arm64
        run: |
          fail=0
          while IFS= read -r bin; do
            arch="$(lipo -archs "$bin" 2>/dev/null || true)"
            printf '%-60s %s\n' "$(basename "$bin")" "$arch"
            case "$arch" in
              *arm64*) ;;
              *) echo "::error::$bin is not arm64 (got '$arch')"; fail=1 ;;
            esac
          done < <(find build/client-cores -type f -perm +111 -name '*test*'; \
                   find build/client-cores/bot -maxdepth 1 -type f -name 'meridian-*' -perm +111)
          test "$fail" -eq 0
      # The engine-agnostic suites: clientnet (77 checks — framing/wire/AEAD/codec/
      # TLS-construct), bot (world-session AEAD interop + connection FSM), and the
      # GDExtension cores (movement, remote-interp, telemetry, pack-manifest,
      # login-core). authd-login-it SKIPs cleanly with no --host/--port. Run under
      # arch -arm64 so the whole test harness executes as native arm64.
      - name: Test client cores (ctest, native arm64)
        run: arch -arm64 ctest --test-dir build/client-cores --output-on-failure

  # --- godot-cpp + the GDExtension framework (arm64) -------------------------
  # Builds the vendored godot-cpp bindings and the meridian GDExtension for arm64,
  # producing client/project/bin/libmeridian.macos.<target>.framework — the exact
  # bundle project/meridian.gdextension references for macos.debug/release.
  client-gdext:
    # Push/PR coverage only (see client-cores). The nightly export builds its own
    # template_debug framework, so it does not depend on this job.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS]
    steps:
      # Same minimal-PATH fix as client-cores: make the Homebrew toolchain
      # reachable from the Actions shell for every later step.
      - name: Put Homebrew (arm64) on PATH
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
      # Same self-sufficiency as client-cores: install the toolchain, don't assume it.
      - name: Ensure build tools (arm64 Homebrew)
        run: HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 brew install flatbuffers openssl@3 || true
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # client/godot-cpp at its pinned 4.7 commit
      - name: Verify Apple-Silicon host (Rosetta-proof) + toolchain
        run: |
          echo "runner process uname -m : $(uname -m)"        # x86_64 under Rosetta on MacOS-M1
          arm="$(sysctl -n hw.optional.arm64 2>/dev/null || echo 0)"
          echo "hw.optional.arm64       : $arm"
          test "$arm" = "1" || { echo "::error::not Apple Silicon (hw.optional.arm64=$arm)"; exit 1; }
          echo "arch -arm64 uname -m    : $(arch -arm64 uname -m)"
          for t in cmake flatc; do
            command -v "$t" >/dev/null || { echo "::error::missing $t"; exit 1; }
          done
          test -f client/godot-cpp/CMakeLists.txt || { echo "::error::godot-cpp submodule not checked out"; exit 1; }
      - name: Configure Homebrew CMake env (arm64 prefixes)
        run: |
          # brew resolves the /opt/homebrew (arm64) prefixes regardless of the
          # host process arch, so this needs no arch wrapper.
          # shellcheck source=/dev/null
          source scripts/dev/_common.sh
          setup_cmake_env
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
      # Cache the compiled godot-cpp bindings, keyed on the pin (ENGINE_VERSION
      # holds GODOT_CPP_COMMIT). godot-cpp sources only change when the pin changes,
      # so on an unchanged pin ninja finds the static lib + objects present and
      # skips ~1000 compiles; the small meridian objects still rebuild each run.
      - name: Cache godot-cpp build (keyed on the pin)
        uses: actions/cache@v4
        with:
          path: build/client-gdext/godot-cpp
          key: godotcpp-arm64-${{ hashFiles('client/ENGINE_VERSION') }}
      - name: Configure GDExtension (native arm64, template_debug)
        run: |
          arch -arm64 cmake -S client -B build/client-gdext \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DGODOTCPP_TARGET=template_debug
      - name: Build godot-cpp + GDExtension (native arm64)
        run: arch -arm64 cmake --build build/client-gdext -j "$(sysctl -n hw.ncpu)"
      # The framework the .gdextension manifest points at must exist and be arm64.
      - name: Assert framework built + is arm64
        run: |
          fw="client/project/bin/libmeridian.macos.template_debug.framework"
          bin="$fw/libmeridian.macos.template_debug"
          test -f "$bin" || { echo "::error::framework binary missing: $bin"; exit 1; }
          arch="$(lipo -archs "$bin")"
          echo "framework binary arch: $arch"
          case "$arch" in *arm64*) ;; *) echo "::error::framework is not arm64 (got '$arch')"; exit 1 ;; esac
          # godot-cpp static lib must be arm64 too.
          gcpp="$(find build/client-gdext -name 'libgodot-cpp*.a' | head -1)"
          echo "godot-cpp lib arch: $(lipo -archs "$gcpp")"
          # OpenSSL (not mbedTLS) is what the net/login core links.
          otool -L "$bin" | grep -iE 'ssl|crypto' || { echo "::error::OpenSSL not linked into the extension"; exit 1; }

  # --- macOS arm64 client EXPORT (#113) --------------------------------------
  # The deliverable this workflow adds: a runnable, ad-hoc-signed macOS arm64 .app
  # of the Godot client, published as a retained nightly artifact, and the
  # version+hash coordinate that fills the `client` stream of the nightly build
  # manifest (#62/#307). Runs on push-to-main, the nightly schedule, and manual
  # dispatch — NOT on PRs (keeps PR CI to the fast core/gdext jobs above).
  #
  # scripts/export-client-macos.sh does the real work (resolve pinned editor,
  # install pinned export templates + inject arm64 engine binaries, build the
  # template_debug GDExtension, headless export, assert arm64-only + framework
  # bundled + ad-hoc signed, zip + hash). The export runs under the SAME
  # Rosetta-proof / arch -arm64 runner-reality handling as the jobs above.
  client-export:
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, macOS]
    steps:
      # Same minimal-PATH fix as the other jobs: reach the Homebrew toolchain.
      - name: Put Homebrew (arm64) on PATH
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
      - name: Ensure build tools (arm64 Homebrew)
        run: HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 brew install flatbuffers openssl@3 || true
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # client/godot-cpp at its pinned 4.7 commit
      - name: Verify Apple-Silicon host (Rosetta-proof) + toolchain
        run: |
          echo "runner process uname -m : $(uname -m)"        # x86_64 under Rosetta on MacOS-M1
          arm="$(sysctl -n hw.optional.arm64 2>/dev/null || echo 0)"
          echo "hw.optional.arm64       : $arm"
          test "$arm" = "1" || { echo "::error::not Apple Silicon (hw.optional.arm64=$arm)"; exit 1; }
          echo "arch -arm64 uname -m    : $(arch -arm64 uname -m)"
          for t in cmake flatc lipo ditto; do
            command -v "$t" >/dev/null || { echo "::error::missing $t"; exit 1; }
          done
          test -f client/godot-cpp/CMakeLists.txt || { echo "::error::godot-cpp submodule not checked out"; exit 1; }
      - name: Configure Homebrew CMake env (arm64 prefixes)
        run: |
          # shellcheck source=/dev/null
          source scripts/dev/_common.sh
          setup_cmake_env
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
      # Reuse godot-cpp objects across runs (the export builds the template_debug
      # GDExtension, same as client-gdext). Keyed on the pin — only rebuilds on a
      # 4.7 bump. Path matches the export script's build tree.
      - name: Cache godot-cpp build (keyed on the pin)
        uses: actions/cache@v4
        with:
          path: build/client-gdext-template_debug/godot-cpp
          key: godotcpp-arm64-export-${{ hashFiles('client/ENGINE_VERSION') }}
      # Fetch + SHA-512-verify the pinned engine (editor zip + export templates
      # .tpz) into client/.godot-bin/. The export script installs the templates
      # from the .tpz and re-verifies the .tpz sum before installing.
      - name: Fetch pinned engine + export templates (SHA-512 verified)
        run: ./scripts/fetch-deps.sh
      # Extract the pinned editor so the export uses the PINNED 4.7 engine (not
      # whatever the runner happens to have in /Applications). The export script's
      # editor resolver checks client/.godot-bin/Godot.app first.
      - name: Extract pinned Godot editor into .godot-bin
        run: |
          ver="$(grep -E '^GODOT_VERSION=' client/ENGINE_VERSION | cut -d= -f2)"
          ditto -x -k "client/.godot-bin/Godot_v${ver}_macos.universal.zip" client/.godot-bin/
          test -x "client/.godot-bin/Godot.app/Contents/MacOS/Godot" \
            || { echo "::error::pinned editor not extracted"; exit 1; }
          arch -arm64 "client/.godot-bin/Godot.app/Contents/MacOS/Godot" --version | head -1
      # The whole export: build template_debug framework, install templates,
      # inject arm64 engine binaries, headless export, assert (arm64-only +
      # framework bundled + ad-hoc signed), zip + hash. arch -arm64 keeps the
      # framework build native even from the Rosetta host.
      - name: Export macOS arm64 client (.app + hash)
        run: |
          arch -arm64 ./scripts/export-client-macos.sh \
            --out build/export/macos \
            --emit-env build/export/macos/client-export.env
      # Independent hard gate on the artifact (belt-and-suspenders vs the script's
      # own asserts): the exported .app MUST bundle the template_debug framework
      # and be pure arm64.
      - name: Assert export bundles the template_debug framework (arm64)
        run: |
          app="build/export/macos/ProjectMeridian.app"
          fw="$app/Contents/Frameworks/libmeridian.macos.template_debug.framework/libmeridian.macos.template_debug"
          test -f "$fw" || { echo "::error::exported .app does not bundle the template_debug framework"; exit 1; }
          arch="$(lipo -archs "$fw")"
          echo "bundled framework arch: $arch"
          case "$arch" in arm64) ;; *) echo "::error::bundled framework not pure arm64 (got '$arch')"; exit 1 ;; esac
          engine="$(find "$app/Contents/MacOS" -maxdepth 1 -type f | head -1)"
          echo "engine binary arch: $(lipo -archs "$engine")"
      - name: Summary
        run: |
          # shellcheck source=/dev/null
          source build/export/macos/client-export.env
          {
            echo "### macOS arm64 client export :package:"
            echo ""
            echo "| field | value |"
            echo "|-------|-------|"
            echo "| version | \`${EXPORT_VERSION}\` |"
            echo "| export_hash (sha256) | \`${EXPORT_HASH}\` |"
            echo "| artifact | \`$(basename "${EXPORT_ZIP}")\` |"
          } >> "$GITHUB_STEP_SUMMARY"
      # Retention: the runnable export zip for 30 days (docs/ops/artifact-retention.md
      # — same window as nightly-content; regenerable from the pinned git SHA).
      - name: Upload macOS arm64 export (retained 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: client-macos-arm64
          path: build/export/macos/ProjectMeridian-macos-arm64.zip
          retention-days: 30
          if-no-files-found: error
      # The tiny coordinate (version + export_hash) the nightly-manifest downloads
      # to fill the build manifest's `client` stream. Kept 90 days to match the
      # manifest's own retention (a manifest may outlive its 30-day export zip).
      - name: Upload client-export coordinate (retained 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: client-export-coordinate
          path: build/export/macos/client-export.env
          retention-days: 90
          if-no-files-found: error

  # --- macOS arm64 boot smoke (#114) -----------------------------------------
  # The minimum "the exported client actually runs on a Mac" gate: take the
  # client-export artifact from the job above, launch it, and prove it reaches
  # its MAIN SCENE (the login screen — project.godot run/main_scene) without
  # crashing (exit 0 + the deterministic MERIDIAN_BOOT_OK marker the login scene
  # prints on _ready(); see client/project/scenes/login/login_screen.gd).
  #
  # The exported .app bakes its resources into the .pck, so there is NO editor
  # import and NO .godot/ seed — the export path sidesteps the #283 MoltenVK
  # cold-import abort entirely (proven on Apple M-series). scripts/boot-smoke-macos.sh
  # does the launch + assertions.
  #
  # TWO boots, from safest to strongest:
  #   1. headless (dummy driver) — window-server-free; proves the .app boots to
  #      the main scene on ANY runner. Does NOT exercise Metal (--headless ignores
  #      --rendering-driver, #283), so it is the always-green boot sanity.
  #   2. metal (windowed, REAL device) — the actual "boots on Metal" gate (Metal
  #      is the shipped default, TD-02 / D-28). Needs a window-server (GUI/Aqua)
  #      session and a real Metal GPU — both present on the self-hosted M2 Max
  #      runner. If this box were ever registered as a GUI-less LaunchDaemon the
  #      windowed boot could not open a Metal surface; step 1 still proves the
  #      boot, and this step's failure would point squarely at the runner session.
  client-boot-smoke:
    if: github.event_name != 'pull_request'
    needs: client-export
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        # No submodules / toolchain: this job only launches a prebuilt .app.
      - name: Download macOS arm64 export
        uses: actions/download-artifact@v4
        with:
          name: client-macos-arm64
          path: build/export/macos
      # ditto is signature-preserving (matches how the export zipped it). Unpack
      # the runnable .app out of the retained zip.
      - name: Unpack the exported .app
        run: |
          zip="build/export/macos/ProjectMeridian-macos-arm64.zip"
          test -f "$zip" || { echo "::error::export zip missing: $zip"; exit 1; }
          ditto -x -k "$zip" build/export/macos/unpacked
          app="build/export/macos/unpacked/ProjectMeridian.app"
          test -d "$app" || { echo "::error::unpacked .app not found: $app"; exit 1; }
          echo "BOOT_APP=$app" >> "$GITHUB_ENV"
          arch="$(lipo -archs "$(find "$app/Contents/MacOS" -maxdepth 1 -type f | head -1)")"
          echo "exported engine arch: $arch"
      # Sanity: the .app boots to the main scene under the dummy driver — works
      # without a window server, so it is the reliable baseline signal.
      - name: Boot smoke — headless (dummy driver, boot-to-main-scene)
        run: arch -arm64 ./scripts/boot-smoke-macos.sh --app "$BOOT_APP" --driver headless --frames 120
      # The real gate: a WINDOWED boot on the native Metal backend, on the runner's
      # real M2 Max GPU. Asserts the boot marker's adapter=… is a real device.
      - name: Boot smoke — Metal (windowed, real device)
        run: arch -arm64 ./scripts/boot-smoke-macos.sh --app "$BOOT_APP" --driver metal --frames 120
