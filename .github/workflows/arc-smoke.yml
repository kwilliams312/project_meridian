# SPDX-License-Identifier: Apache-2.0
# Proves the self-hosted runners work on BOTH arches and that dind/buildx can
# build a container. Each job runs on its arch's runner label and builds a
# trivial image natively (no QEMU). Triggers: manual (once this reaches the
# default branch), or a push that touches this file (works on any branch — a
# workflow_dispatch is only dispatchable from the default branch).
name: arc-smoke

on:
  workflow_dispatch: {}
  push:
    branches: [dev]
    paths:
      - .github/workflows/arc-smoke.yml

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner: [meridian-amd64, meridian-arm64]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Report arch
        run: uname -m

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build a trivial image natively (proves dind + buildx)
        run: |
          printf 'FROM alpine:3.20\nRUN uname -m > /arch.txt\n' > Dockerfile.smoke
          docker buildx build -f Dockerfile.smoke --load -t arc-smoke:${{ matrix.runner }} .
          docker run --rm arc-smoke:${{ matrix.runner }} cat /arch.txt
